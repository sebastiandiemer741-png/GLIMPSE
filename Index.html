<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GLIMPSE V101 | GLOBAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --tt-pink: #ff0050; --tt-cyan: #00f2ea; --gold: #face15; --mod: #007aff; --pk-blue: #007aff; --pk-red: #ff2d55; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { height: 100%; background: #000; font-family: -apple-system, sans-serif; color: white; overflow: hidden; position: fixed; width: 100%; }

        /* --- VIDEO GRID (THE COURT) --- */
        #court { position: fixed; inset: 0; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 2px; background: #000; z-index: 1; }
        .slot { position: relative; background: #0f0f0f; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 0.5px solid rgba(255,255,255,0.1); }
        .slot video, .slot img { width: 100%; height: 100%; object-fit: cover; }
        #v-host { transform: scaleX(-1); }
        .slot-label { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.5); padding: 2px 10px; border-radius: 5px; font-size: 11px; z-index: 10; backdrop-filter: blur(5px); }

        /* --- TOP HUD --- */
        #pk-zone { position: absolute; top: 110px; left: 5%; width: 90%; height: 16px; background: #222; border-radius: 8px; display: none; z-index: 200; overflow: hidden; border: 1.5px solid white; }
        #pk-b { height: 100%; width: 50%; background: var(--pk-blue); float: left; transition: 0.5s; }
        #pk-r { height: 100%; width: 50%; background: var(--pk-red); float: left; transition: 0.5s; }

        /* --- INVITE NOTIFICATION --- */
        #invite-alert { position: fixed; top: 55px; left: 5%; width: 90%; background: linear-gradient(90deg, var(--tt-pink), var(--mod)); padding: 12px; border-radius: 15px; z-index: 9000; display: none; justify-content: space-between; align-items: center; border: 1.5px solid white; animation: slideDown 0.5s forwards; }

        /* --- INTERACTION --- */
        #chat-area { position: absolute; bottom: 130px; left: 15px; width: 75%; height: 220px; display: flex; flex-direction: column; justify-content: flex-end; pointer-events: none; z-index: 5000; }
        .m { background: rgba(0,0,0,0.3); padding: 6px 14px; margin-bottom: 5px; border-radius: 15px; font-size: 14px; width: fit-content; backdrop-filter: blur(10px); animation: fadeIn 0.3s forwards; }

        #dock { position: fixed; bottom: 30px; width: 100%; padding: 0 15px; display: flex; gap: 10px; z-index: 5500; align-items: center; }
        #msg-in { flex: 1; background: rgba(255,255,255,0.2); border: none; padding: 14px 20px; border-radius: 30px; color: white; outline: none; font-size: 16px; }
        .action-btn { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.1); color: white; }

        /* --- SIDEBAR TOOLS --- */
        #tools { position: absolute; right: 15px; top: 120px; display: flex; flex-direction: column; gap: 18px; z-index: 4000; }
        .tool-btn { display: flex; flex-direction: column; align-items: center; gap: 5px; color: white; font-size: 22px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .tool-btn span { font-size: 10px; font-weight: 600; text-transform: uppercase; }

        /* --- PANELS --- */
        .panel { position: absolute; bottom: 0; width: 100%; background: #111; border-top-left-radius: 25px; border-top-right-radius: 25px; z-index: 8000; padding: 25px; transform: translateY(100%); transition: 0.3s; border-top: 2px solid rgba(255,255,255,0.1); }
        .panel.open { transform: translateY(0); }
        .g-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 20px; }

        #starter { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #start-btn { background: var(--tt-pink); color: white; border: none; padding: 18px 70px; border-radius: 40px; font-weight: 800; font-size: 18px; margin-top: 20px; box-shadow: 0 10px 30px rgba(255,0,80,0.3); }

        @keyframes slideDown { from { transform: translateY(-150%); } to { transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes giftUp { 0% { transform: scale(0); opacity: 0; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
    </style>
</head>
<body onclick="playVideo()">

    <div id="court">
        <div class="slot"><video id="v-host" autoplay playsinline muted></video><div class="slot-label">Host (Du)</div></div>
        <div class="slot" id="s2"><i class="fas fa-video-slash" style="opacity:0.1; font-size:30px;"></i><div class="slot-label">Warten...</div></div>
        <div class="slot" id="s3"><i class="fas fa-video-slash" style="opacity:0.1; font-size:30px;"></i><div class="slot-label">Warten...</div></div>
        <div class="slot" id="s4"><i class="fas fa-video-slash" style="opacity:0.1; font-size:30px;"></i><div class="slot-label">Warten...</div></div>
    </div>

    <div id="pk-zone"><div id="pk-b"></div><div id="pk-r"></div></div>
    <div id="chat-area"></div>

    <div id="invite-alert">
        <div style="display:flex; align-items:center; gap:10px;">
            <img src="https://i.pravatar.cc/100?u=sarah" style="width:35px; border-radius:50%; border:1.5px solid white;">
            <span style="font-weight:700;">Sarah_Live möchte beitreten</span>
        </div>
        <button onclick="acceptGuest()" style="background:white; color:black; border:none; padding:8px 18px; border-radius:20px; font-weight:bold;">ANNEHMEN</button>
    </div>

    <div id="tools">
        <div class="tool-btn" onclick="togglePK()"><i class="fas fa-bolt"></i><span>Match</span></div>
        <div class="tool-btn" onclick="toggleThermal()"><i class="fas fa-magic"></i><span>Filter</span></div>
        <div class="tool-btn" onclick="location.reload()"><i class="fas fa-sync"></i><span>Flip</span></div>
    </div>

    <div id="dock">
        <input type="text" id="msg-in" placeholder="Schreib was..." onkeypress="if(event.key==='Enter') postMsg()">
        <div class="action-btn" onclick="togglePanel('p-guest')" style="color:var(--tt-cyan)"><i class="fas fa-user-plus"></i></div>
        <div class="action-btn" onclick="togglePanel('p-gift')" style="color:var(--gold)"><i class="fas fa-gift"></i></div>
        <div class="action-btn" onclick="postMsg()" style="background:var(--tt-pink)"><i class="fas fa-paper-plane"></i></div>
    </div>

    <div id="p-guest" class="panel">
        <h3 style="text-align:center;">Gäste-Anfragen</h3>
        <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:15px; display:flex; justify-content:space-between; align-items:center; margin-top:20px;">
            <div style="display:flex; align-items:center; gap:12px;"><img src="https://i.pravatar.cc/100?u=sarah" style="width:40px; border-radius:50%;"><b>Sarah_Live</b></div>
            <button onclick="acceptGuest()" style="background:var(--tt-pink); color:white; border:none; padding:10px 20px; border-radius:10px; font-weight:bold;">AKZEPTIEREN</button>
        </div>
    </div>

    <div id="p-gift" class="panel">
        <h3 style="text-align:center; color:var(--gold);">Geschenke</h3>
        <div class="g-grid">
            <div onclick="sendGift('Rose', '🌹', 1)" style="text-align:center;"><div style="font-size:35px;">🌹</div><p>1</p></div>
            <div onclick="sendGift('Diamant', '💎', 20)" style="text-align:center;"><div style="font-size:35px;">💎</div><p>20</p></div>
            <div onclick="sendGift('Universum', '🪐', 60)" style="text-align:center;"><div style="font-size:35px;">🪐</div><p>60</p></div>
        </div>
    </div>

    <div id="starter">
        <i class="fab fa-tiktok" style="font-size:60px; color:white; margin-bottom:10px;"></i>
        <h2 style="letter-spacing:3px;">GLIMPSE LIVE</h2>
        <button id="start-btn" onclick="startLive()">START LIVE</button>
    </div>

    <div id="gift-overlay" style="position:fixed; inset:0; pointer-events:none; z-index:9000; display:flex; align-items:center; justify-content:center;"></div>

    <script>
        let isPK = false, pkScore = 50;
        const v = document.getElementById('v-host');

        async function startLive() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}});
                v.srcObject = s;
                document.getElementById('starter').style.display = 'none';
                postMsg("System", "Stream bereit. 🔥");
                // Simuliert echte Zuschauer-Anfrage nach 7 Sek
                setTimeout(() => { document.getElementById('invite-alert').style.display = 'flex'; if(navigator.vibrate) navigator.vibrate([100,50,100]); }, 7000);
            } catch(e) { alert("Kamera-Fehler! Nutze Safari."); }
        }

        function playVideo() { if(v.paused && v.srcObject) v.play(); }

        function postMsg(u = "Du", t) {
            const val = t || document.getElementById('msg-in').value;
            if(!val) return;
            const c = document.getElementById('chat-area');
            const m = document.createElement('div');
            m.className = 'm';
            m.innerHTML = `<b style="color:var(--tt-cyan)">${u}:</b> ${val}`;
            c.appendChild(m);
            if(c.children.length > 6) c.removeChild(c.firstChild);
            if(!t) document.getElementById('msg-in').value = "";
        }

        function togglePanel(id) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('open'));
            document.getElementById(id).classList.add('open');
        }

        function acceptGuest() {
            const s = document.getElementById('s2');
            s.innerHTML = `<img src="https://i.pravatar.cc/400?u=sarah"><div class="slot-label">Sarah_Live</div>`;
            document.getElementById('invite-alert').style.display = 'none';
            document.getElementById('p-guest').classList.remove('open');
            postMsg("System", "Sarah ist jetzt Live dabei!");
        }

        function togglePK() { isPK = !isPK; document.getElementById('pk-zone').style.display = isPK ? 'block' : 'none'; }

        function sendGift(n, i, p) {
            const over = document.getElementById('gift-overlay');
            const g = document.createElement('div');
            g.style.animation = "giftUp 2s forwards";
            g.innerHTML = `<h1 style="font-size:80px;">${i}</h1><p style="font-weight:bold; color:var(--gold); text-align:center;">${n}</p>`;
            over.appendChild(g);
            setTimeout(() => g.remove(), 2000);
            postMsg("Geschenk", `hat ${i} ${n} gesendet!`);
            if(isPK) { pkScore = Math.min(95, pkScore + p); updatePK(); }
            document.getElementById('p-gift').classList.remove('open');
            if(navigator.vibrate) navigator.vibrate(60);
        }

        function updatePK() {
            document.getElementById('pk-b').style.width = pkScore + "%";
            document.getElementById('pk-r').style.width = (100 - pkScore) + "%";
        }

        function toggleThermal() { v.style.filter = v.style.filter === 'invert(1) hue-rotate(90deg)' ? 'none' : 'invert(1) hue-rotate(90deg)'; }
    </script>
</body>
</html>
