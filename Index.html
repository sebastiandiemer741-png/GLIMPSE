<script>
    let gp = 750;
    const canvas = document.getElementById('fx-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    function startFXApp() {
        const name = document.getElementById('user-id').value;
        if(name.length > 1) {
            document.getElementById('display-name').innerText = "@" + name;
            document.getElementById('gate').style.display = 'none';
            document.getElementById('app').style.display = 'block';
        }
    }

    // VERBESSERTER KAMERA-ZUGRIFF
    let live = false;
    async function toggleFXPanel() {
        const p = document.getElementById('fx-panel');
        const videoElement = document.getElementById('v-main');
        
        // Wenn wir noch nicht "Live" sind, fragen wir nach der Kamera
        if(!live) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: false 
                });
                // Weltneuheit: Wir spiegeln DEIN Kamerabild in das Video-Fenster!
                videoElement.srcObject = stream;
                videoElement.play();
                live = true;
                p.style.display = 'block';
            } catch(err) {
                alert("Kamera-Fehler: Bitte erlaube den Zugriff in den iPhone-Einstellungen > Safari > Kamera.");
                console.error(err);
            }
        } else {
            p.style.display = (p.style.display === 'block') ? 'none' : 'block';
        }
    }

    function triggerFX(type) {
        const v = document.getElementById('v-main');
        if(type === 'shake') {
            v.style.transform = "scale(1.1) rotate(5deg)";
            setTimeout(() => v.style.transform = "scale(1)", 500);
        }
        if(type === 'morph') {
            v.style.filter = "hue-rotate(180deg) invert(1)";
            setTimeout(() => v.style.filter = "none", 2000);
        }
        if(type === 'fireworks') { createParticles(); }
        if(navigator.vibrate) navigator.vibrate([50, 30, 50]);
    }

    function createParticles() {
        const particles = [];
        for(let i=0; i<50; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: canvas.height,
                speed: Math.random() * 15 + 5,
                color: `hsl(${Math.random() * 360}, 100%, 50%)`
            });
        }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.y -= p.speed;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
                ctx.fill();
            });
            if(particles.length > 0 && particles[0].y > -50) requestAnimationFrame(animate);
        }
        animate();
    }

    document.body.addEventListener('touchstart', () => { 
        const v = document.getElementById('v-main');
        if(!v.srcObject) v.muted = false; 
    }, {once: true});
</script>
