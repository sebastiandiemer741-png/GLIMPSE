<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GLIMPSE V51 | LIVE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --live-red: #ff3b30; --neon: #007aff; --privacy: #5856d6; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: -apple-system, sans-serif; color: white; overflow: hidden; }

        /* --- THE LIVE CAMERA (PRIVACY FILTER) --- */
        #v { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; transform: scaleX(-1); filter: contrast(1.5) brightness(0.6) hue-rotate(240deg); }
        #scan-overlay { position: fixed; inset: 0; z-index: 2; background: linear-gradient(rgba(88,86,214,0.1) 1px, transparent 1px); background-size: 100% 4px; pointer-events: none; }

        /* --- LIVE UI --- */
        .live-hud { position: relative; z-index: 100; height: 100%; display: none; flex-direction: column; justify-content: space-between; padding: 60px 20px 40px; }
        
        .live-badge { background: var(--live-red); color: white; padding: 5px 12px; border-radius: 5px; font-weight: 900; font-size: 12px; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .viewer-count { background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 5px; font-size: 12px; backdrop-filter: blur(10px); }

        .chat-area { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 20px 0; mask-image: linear-gradient(to top, black 80%, transparent); }
        .chat-msg { background: rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 10px; margin-bottom: 8px; font-size: 13px; border-left: 3px solid var(--neon); width: fit-content; max-width: 80%; }

        .controls { display: flex; justify-content: space-around; align-items: center; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .circle-btn { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); }
        .btn-stop { background: var(--live-red); color: white; border: none; }

        #gate { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <video id="v" autoplay playsinline muted></video>
    <div id="scan-overlay"></div>

    <div id="gate">
        <h1 style="letter-spacing: 5px; margin-bottom: 30px;">AVATAR LIVE</h1>
        <button onclick="startLive()" style="background: white; color: black; border: none; padding: 20px 60px; border-radius: 15px; font-weight: 900; cursor: pointer;">GO LIVE (ANONYM)</button>
        <p style="font-size: 10px; opacity: 0.5; margin-top: 20px;">Deine echte Identität bleibt verschlüsselt.</p>
    </div>

    <div id="app" class="live-hud">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div class="live-badge">● LIVE</div>
            <div class="viewer-count"><i class="fas fa-users"></i> 482</div>
        </div>

        <div class="chat-area" id="chat">
            <div class="chat-msg"><b>User_99:</b> Cooler Avatar! 🔥</div>
            <div class="chat-msg"><b>SkillMaster:</b> Kannst du mir das mit Python nochmal zeigen?</div>
            <div class="chat-msg"><b>EcoLover:</b> G-Power gesendet! ⚡</div>
        </div>

        <div class="controls">
            <div class="circle-btn" onclick="alert('Avatar gewechselt!')"><i class="fas fa-user-astronaut"></i></div>
            <div class="circle-btn btn-stop" onclick="location.reload()"><i class="fas fa-stop"></i></div>
            <div class="circle-btn" onclick="alert('Mikrofon stummgeschaltet')"><i class="fas fa-microphone"></i></div>
        </div>
    </div>

    <script>
        async function startLive() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
                document.getElementById('v').srcObject = s;
                document.getElementById('gate').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
                
                // Simulierter Chat-Verlauf
                setInterval(() => {
                    const chat = document.getElementById('chat');
                    const msg = document.createElement('div');
                    msg.className = 'chat-msg';
                    msg.innerHTML = `<b>Guest_${Math.floor(Math.random()*100)}:</b> Toller Content! 🚀`;
                    chat.appendChild(msg);
                    if(chat.children.length > 5) chat.removeChild(chat.firstChild);
                }, 3000);

            } catch (e) { alert("Live-Modus benötigt Kamera."); }
        }
    </script>
</body>
</html>
