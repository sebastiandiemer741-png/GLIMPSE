<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GLIMPSE V33 | FINAL FIX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon: #00f2ea; --magenta: #ff00ff; --gold: #ffd700; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { height: 100%; background: #000; font-family: sans-serif; color: white; overflow: hidden; }

        /* --- BACKGROUND --- */
        #v-live { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; transform: scaleX(-1); background: #111; }

        /* --- START SCREEN --- */
        #gate { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .gate-btn { padding: 20px 40px; border-radius: 40px; border: 2px solid var(--neon); background: transparent; color: var(--neon); font-weight: 900; font-size: 18px; margin-top: 30px; box-shadow: 0 0 15px var(--neon); }

        /* --- UI LAYER --- */
        #app { display: none; position: relative; z-index: 100; height: 100%; }
        .sidebar { position: absolute; right: 20px; bottom: 150px; display: flex; flex-direction: column; gap: 20px; }
        .s-btn { width: 60px; height: 60px; background: rgba(255,255,255,0.1); backdrop-filter: blur(15px); border-radius: 20px; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.2); font-size: 24px; }
        
        .dock { position: fixed; bottom: 30px; left: 5%; width: 90%; height: 75px; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); border-radius: 35px; border: 1px solid #333; display: flex; justify-content: space-around; align-items: center; }
        .plus { width: 65px; height: 65px; background: #fff; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; transform: translateY(-15px); }
    </style>
</head>
<body>

    <video id="v-live" autoplay playsinline muted></video>

    <div id="gate">
        <h1 style="letter-spacing:8px;">GLIMPSE V33</h1>
        <p style="opacity:0.6; margin-top:10px;">Weltneuheit wird initialisiert...</p>
        <button class="gate-btn" onclick="activateApp()">SYSTEM STARTEN</button>
        <p id="err-log" style="color:red; margin-top:20px; font-size:12px;"></p>
    </div>

    <div id="app">
        <div style="position:fixed; top:50px; left:20px; background:rgba(0,0,0,0.5); padding:8px 15px; border-radius:20px; border:1px solid var(--gold); color:var(--gold); font-weight:900;">
            <i class="fas fa-bolt"></i> 5.000 GP
        </div>

        <div class="sidebar">
            <div class="s-btn" onclick="location.reload()"><i class="fas fa-power-off"></i></div>
            <div class="s-btn" onclick="alert('Match Suche...')"><i class="fas fa-swords" style="color:var(--magenta)"></i></div>
            <div class="s-btn" onclick="alert('G-Power verdoppelt!')"><i class="fas fa-heart" style="color:red"></i></div>
        </div>

        <div class="dock">
            <i class="fas fa-house" style="color:var(--neon)"></i>
            <i class="fas fa-magnifying-glass"></i>
            <label for="up" class="plus"><i class="fas fa-plus"></i></label>
            <input type="file" id="up" accept="video/*" style="display:none" onchange="alert('Video geladen!')">
            <i class="fas fa-paper-plane"></i>
            <i class="fas fa-user"></i>
        </div>
    </div>

    <script>
        async function activateApp() {
            const video = document.getElementById('v-live');
            const errLog = document.getElementById('err-log');

            try {
                // Kamera-Abfrage
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: false 
                });
                
                video.srcObject = stream;
                
                // Sobald Video bereit, UI zeigen
                video.onloadedmetadata = () => {
                    video.play();
                    document.getElementById('gate').style.display = 'none';
                    document.getElementById('app').style.display = 'block';
                };

            } catch (err) {
                console.error(err);
                errLog.innerText = "FEHLER: " + err.name + " - " + err.message + 
                                   "\nBitte Einstellungen > Safari > Kamera prüfen!";
            }
        }

        // Apple Sound Fix
        document.body.addEventListener('touchstart', () => { 
            document.getElementById('v-live').muted = false; 
        }, {once: true});
    </script>
</body>
</html>
