<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GLIMPSE V77 | FIX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --tt-pink: #ff0050; --tt-cyan: #00f2ea; --gold: #ffd700; --mod: #007aff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { height: 100%; background: #000; font-family: -apple-system, sans-serif; color: white; overflow: hidden; position: fixed; width: 100%; }

        /* --- VIDEO LAYER (Das Wichtigste) --- */
        #v-container { position: fixed; inset: 0; z-index: 1; background: #000; }
        #v { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); background: #000; }

        /* --- CHAT LAYER (Z-INDEX 1000) --- */
        #chat { 
            position: absolute; bottom: 120px; left: 15px; width: 80%; height: 200px; 
            display: flex; flex-direction: column; justify-content: flex-end; 
            pointer-events: none; z-index: 1000; 
        }
        .msg { 
            background: rgba(0,0,0,0.6); padding: 8px 12px; margin-bottom: 6px; 
            border-radius: 15px; font-size: 13px; width: fit-content; 
            border-left: 4px solid var(--tt-cyan); animation: slide 0.3s ease;
            backdrop-filter: blur(8px); pointer-events: auto;
        }

        /* --- HUD ELEMENTS --- */
        .hud { position: relative; z-index: 1100; height: 100%; display: none; padding: 50px 15px; }
        .sidebar { position: absolute; right: 15px; top: 150px; display: flex; flex-direction: column; gap: 15px; }
        .s-btn { width: 50px; height: 50px; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; border: 1px solid white; }

        .input-area { position: fixed; bottom: 30px; width: 90%; left: 5%; display: flex; gap: 10px; z-index: 1200; }
        #u-in { flex: 1; background: rgba(255,255,255,0.2); border: none; padding: 15px; border-radius: 30px; color: white; outline: none; }

        @keyframes slide { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        #gate { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="v-container">
        <video id="v" autoplay playsinline muted></video>
    </div>

    <div id="chat"></div>

    <div id="gate">
        <div style="background:var(--tt-pink); width:70px; height:70px; border-radius:20px; display:flex; align-items:center; justify-content:center; margin-bottom:20px; box-shadow: 0 0 30px var(--tt-pink);">
            <i class="fas fa-video" style="font-size:30px;"></i>
        </div>
        <h2 style="letter-spacing:5px;">OMNIPOTENT V77</h2>
        <p style="font-size:12px; opacity:0.6; margin-top:10px;">Bitte Kamera-Zugriff erlauben</p>
        <button onclick="startApp()" style="background:white; color:black; border:none; padding:20px 60px; border-radius:40px; font-weight:900; margin-top:30px; font-size:16px;">LIVE GEHEN</button>
    </div>

    <div id="app" class="hud">
        <div class="sidebar">
            <div class="s-btn" onclick="spawnGhost()"><i class="fas fa-hand-sparkles"></i></div>
            <div class="s-btn" onclick="location.reload()"><i class="fas fa-sync"></i></div>
        </div>
        <div class="input-area">
            <input type="text" id="u-in" placeholder="Chatte..." onkeypress="if(event.key==='Enter') send()">
        </div>
    </div>

    <script>
        const video = document.getElementById('v');

        async function startApp() {
            const constraints = {
                video: {
                    facingMode: "user",
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                },
                audio: false
            };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                
                // Extra Force-Play für iOS
                video.onloadedmetadata = () => {
                    video.play().catch(e => console.error("Autoplay failed:", e));
                };

                document.getElementById('gate').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                
                initChat();
            } catch (err) {
                console.error("Kamera-Fehler:", err);
                alert("KAMERA-FEHLER: Bitte stelle sicher, dass du Safari nutzt und den Zugriff erlaubst. (Einstellungen -> Safari -> Kamera)");
            }
        }

        function initChat() {
            addMsg("System", "Stream gestartet. Kamera aktiv! ✅");
            const names = ["Sarah", "Rico", "Lia", "Max"];
            setInterval(() => {
                addMsg(names[Math.floor(Math.random()*4)], "Wir sehen dich! 🔥");
            }, 4000);
        }

        function addMsg(n, t) {
            const c = document.getElementById('chat');
            const m = document.createElement('div');
            m.className = 'msg';
            m.innerHTML = `<b>${n}:</b> ${t}`;
            c.appendChild(m);
            if(c.children.length > 5) c.removeChild(c.firstChild);
        }

        function send() {
            const i = document.getElementById('u-in');
            if(!i.value) return;
            addMsg("Du", i.value);
            i.value = "";
        }

        function spawnGhost() {
            const g = document.createElement('div');
            g.innerHTML = '🖐️';
            g.style.cssText = "position:absolute; left:40%; bottom:0; font-size:120px; filter:drop-shadow(0 0 30px white); animation: ghost 1.5s forwards; z-index:1500; pointer-events:none;";
            document.body.appendChild(g);
            setTimeout(() => g.remove(), 1500);
            if(navigator.vibrate) navigator.vibrate(50);
        }
    </script>
    <style>
        @keyframes ghost { 0% { transform: translateY(500px) scale(0.5); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(-300px) scale(2); opacity: 0; } }
    </style>
</body>
</html>
