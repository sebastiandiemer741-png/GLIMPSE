<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GLIMPSE V117 | G-PROTOCOL</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --tt-red: #ff0050; --tt-cyan: #00f2ea; --g-blue: #007aff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { height: 100%; background: #000; font-family: -apple-system, sans-serif; color: white; overflow: hidden; position: fixed; width: 100%; }

        /* --- G-FEATURE: EINLADUNGS-BANNER --- */
        #g-invite-alert { 
            position: fixed; top: 70px; left: 10px; right: 10px; 
            background: linear-gradient(90deg, var(--g-blue), #5856d6); 
            padding: 15px; border-radius: 15px; z-index: 30000; 
            display: none; align-items: center; justify-content: space-between;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1.5px solid rgba(255,255,255,0.2);
            animation: slideDown 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* --- LAYOUTS --- */
        #live-container { position: fixed; inset: 0; display: none; z-index: 10; flex-direction: column; }
        .video-slot { flex: 1; position: relative; background: #111; overflow: hidden; border-bottom: 1px solid #222; transition: 0.5s; }
        #local-player { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #remote-player { width: 100%; height: 100%; object-fit: cover; }

        /* --- G-SIDEBAR (ERWEITERT) --- */
        #g-sidebar { position: absolute; right: 15px; bottom: 140px; display: flex; flex-direction: column; gap: 22px; z-index: 1000; pointer-events: auto; }
        .g-btn { display: flex; flex-direction: column; align-items: center; gap: 5px; color: white; text-decoration: none; }
        .g-btn i { font-size: 30px; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.8)); }
        .g-btn span { font-size: 10px; font-weight: bold; text-transform: uppercase; }

        /* --- G-PANEL (GÄSTE-LISTE) --- */
        #g-panel { 
            position: fixed; bottom: 0; width: 100%; height: 40%; 
            background: #1c1c1e; border-top-left-radius: 20px; border-top-right-radius: 20px; 
            z-index: 40000; transform: translateY(100%); transition: 0.3s ease; padding: 20px;
        }
        #g-panel.open { transform: translateY(0); }

        @keyframes slideDown { from { transform: translateY(-150%); } to { transform: translateY(0); } }
    </style>
</head>
<body>

    <div style="position:fixed; top:env(safe-area-inset-top, 20px); width:100%; display:flex; justify-content:center; gap:30px; z-index:10000; font-weight:bold;">
        <div onclick="location.reload()" style="opacity:0.6;">Für dich</div>
        <div onclick="startLiveMode()" id="live-tab">Live</div>
    </div>

    <div id="g-invite-alert">
        <div style="display:flex; align-items:center; gap:12px;">
            <div style="width:40px; height:40px; border-radius:50%; background:white; overflow:hidden;"><img src="https://i.pravatar.cc/100?u=sarah" style="width:100%;"></div>
            <div><p style="font-weight:bold; font-size:14px;">Sarah_Live</p><p style="font-size:11px; opacity:0.9;">Möchte deinem Live beitreten</p></div>
        </div>
        <button onclick="acceptGuest()" style="background:white; color:var(--g-blue); border:none; padding:8px 15px; border-radius:20px; font-weight:bold; font-size:12px;">ANNEHMEN</button>
    </div>

    <div id="live-container">
        <div class="video-slot" id="slot-host"><div id="local-player"></div></div>
        <div class="video-slot" id="slot-guest" style="display:none;"><div id="remote-player"></div></div>

        <div style="position:absolute; inset:0; pointer-events:none;">
            <div id="g-sidebar">
                <div class="g-btn" onclick="toggleGPanel()"><i class="fas fa-users" style="color:var(--tt-cyan);"></i><span>Gäste</span></div>
                <div class="g-btn" onclick="triggerInvite()"><i class="fas fa-user-plus" style="color:white;"></i><span>Invite</span></div>
                <div class="g-btn" onclick="sendGift()"><i class="fas fa-gift" style="color:#face15;"></i><span>Gift</span></div>
            </div>
            
            <div id="chat-area" style="position:absolute; bottom:100px; left:15px; width:70%;"></div>
        </div>
    </div>

    <div id="g-panel">
        <div style="width:40px; height:5px; background:rgba(255,255,255,0.2); border-radius:5px; margin:0 auto 15px;"></div>
        <h3 style="text-align:center; font-size:16px; margin-bottom:20px;">Live-Gästeanfragen</h3>
        <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:15px; display:flex; align-items:center; justify-content:space-between;">
            <div style="display:flex; align-items:center; gap:10px;">
                <img src="https://i.pravatar.cc/100?u=sarah" style="width:35px; border-radius:50%;">
                <span>Sarah_Live</span>
            </div>
            <button onclick="acceptGuest()" style="background:var(--g-blue); color:white; border:none; padding:8px 15px; border-radius:10px; font-weight:bold;">Hinzufügen</button>
        </div>
    </div>

    <div id="gate" style="position:fixed; inset:0; background:#000; z-index:50000; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <i class="fab fa-tiktok" style="font-size:60px; margin-bottom:20px;"></i>
        <h2>GLIMPSE G-SYSTEM</h2>
        <button onclick="startApp()" style="background:white; color:black; border:none; padding:18px 60px; border-radius:40px; font-weight:900; margin-top:20px;">APP STARTEN</button>
    </div>

    <script>
        let client = AgoraRTC.createClient({ mode: "live", codec: "vp8" });
        let localTracks = { videoTrack: null, audioTrack: null };

        function startApp() { document.getElementById('gate').style.display = 'none'; }

        function startLiveMode() {
            document.getElementById('live-container').style.display = 'flex';
            document.getElementById('live-tab').style.borderBottom = "3px solid white";
            setupAgora();
        }

        async function setupAgora() {
            try {
                [localTracks.audioTrack, localTracks.videoTrack] = await AgoraRTC.createMicrophoneAndCameraTracks();
                localTracks.videoTrack.play("local-player");
                
                // Simuliert G-Funktion: Nach 5 Sek klopft jemand an
                setTimeout(() => {
                    document.getElementById('g-invite-alert').style.display = 'flex';
                    if(navigator.vibrate) navigator.vibrate([100,50,100]);
                }, 5000);

            } catch(e) { console.error("Agora Error", e); }
        }

        function triggerInvite() {
            pushChat("System", "Einladungslink in Zwischenablage kopiert! 🔗");
            if(navigator.vibrate) navigator.vibrate(50);
        }

        function toggleGPanel() {
            document.getElementById('g-panel').classList.toggle('open');
        }

        function acceptGuest() {
            document.getElementById('slot-guest').style.display = 'block';
            document.getElementById('remote-player').innerHTML = '<img src="https://i.pravatar.cc/600?u=sarah" style="width:100%; height:100%; object-fit:cover;">';
            document.getElementById('g-invite-alert').style.display = 'none';
            document.getElementById('g-panel').classList.remove('open');
            pushChat("Sarah_Live", "Hey! Danke fürs Reinlassen! 😍");
        }

        function pushChat(u, t) {
            const area = document.getElementById('chat-area');
            const m = document.createElement('div');
            m.style = "background:rgba(0,0,0,0.3); padding:8px; border-radius:10px; margin-bottom:5px; font-size:14px; border-left:3px solid var(--tt-cyan); animation: slideIn 0.3s forwards;";
            m.innerHTML = `<b>${u}:</b> ${t}`;
            area.appendChild(m);
        }

        function sendGift() {
            pushChat("GIFT", "Du hast ein Universum gesendet! 🪐");
            if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
        }
    </script>
</body>
</html>
