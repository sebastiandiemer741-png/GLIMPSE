<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GLIMPSE V77 | DYNAMIC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --tt-pink: #ff0050; --tt-cyan: #00f2ea; --mod: #007aff; --gold: #ffd700; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { height: 100%; background: #000; font-family: -apple-system, sans-serif; color: white; overflow: hidden; position: fixed; width: 100%; }

        /* --- DYNAMIC VIDEO ENGINE --- */
        #main-container { position: fixed; inset: 0; display: grid; gap: 2px; background: #000; z-index: 1; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Layout-Klassen */
        .layout-0 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
        .layout-1 { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
        .layout-2, .layout-3 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }

        .v-slot { position: relative; background: #111; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        video, img { width: 100%; height: 100%; object-fit: cover; }
        #v { transform: scaleX(-1); }
        .slot-name { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 6px; font-size: 11px; z-index: 10; border: 0.5px solid rgba(255,255,255,0.2); }

        /* --- CHAT OVERLAY --- */
        #chat { position: absolute; bottom: 110px; left: 15px; width: 70%; height: 200px; display: flex; flex-direction: column; justify-content: flex-end; pointer-events: none; z-index: 500; }
