<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GLIMPSE V116 | ECOSYSTEM</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --tt-red: #ff0050; --tt-cyan: #00f2ea; --glass: rgba(0,0,0,0.5); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { height: 100%; background: #000; font-family: -apple-system, sans-serif; color: white; overflow: hidden; position: fixed; width: 100%; }

        /* --- NAVIGATION TABS --- */
        #nav-top { position: fixed; top: env(safe-area-inset-top, 20px); width: 100%; display: flex; justify-content: center; gap: 30px; z-index: 10000; font-weight: bold; font-size: 17px; opacity: 0.8; }
        .nav-item { cursor: pointer; padding: 10px; }
        .nav-active { border-bottom: 3px solid white; opacity: 1; }

        /* --- MODUS 1: VIDEO FEED (Dein React Native Code) --- */
        #feed-container { position: fixed; inset: 0; overflow-y: scroll; scroll-snap-type: y mandatory; display: block; z-index: 5; }
        .video-post { width: 100vw; height: 100vh; scroll-snap-align: start; position: relative; background: #000; }
        .feed-video { width: 100%; height: 100%; object-fit: cover; }
        
        .feed-ui-right { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .feed-ui-bottom { position: absolute; bottom: 40px; left: 15px; width: 75%; }
        .feed-btn { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .feed-btn i { font-size: 32px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8)); }

        /* --- MODUS 2: LIVE STREAM (Agora-Integration) --- */
        #live-container { position: fixed; inset: 0; display: none; z-index: 10; background: #000; }
        #local-player { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        /* --- UI ELEMENTE AUS V115 (Shop, Chat, etc.) --- */
        #live-ui { position: absolute; inset: 0; z-index: 20; pointer-events: none; }
        .live-sidebar { position: absolute; right: 15px; bottom: 130px; pointer-events: auto; display: flex; flex-direction: column; gap: 20px; }
        #chat-flow { position: absolute; bottom: 90px; left: 15px; width: 70%; pointer-events: none; }
        .m { background: rgba(0,0,0,0.3); padding: 8px; border-radius: 10px; margin-bottom: 5px; font-size: 14px; border-left: 3px solid var(--tt-cyan); }

        #gate { position: fixed; inset: 0; background: #000; z-index: 20000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        #gate button { background: white; color: black; border: none; padding: 20px 70px; border-radius: 40px; font-weight: 900; margin-top: 20px; }

        #pk-bar { display: none; position: fixed; top: 100px; left: 50px; right: 50px; height: 10px; background: blue; border-radius: 5px; overflow: hidden; z-index: 100; border: 1.5px solid white; }
        #pk-progress { width: 50%; height: 100%; background: red; transition: width 0.3s; }
    </style>
</head>
<body>

    <div id="nav-top">
        <div id="tab-feed" class="nav-item nav-active" onclick="switchTab('feed')">Für dich</div>
        <div id="tab-live" class="nav-item" onclick="switchTab('live')">Live</div>
    </div>

    <div id="feed-container">
        <div class="video-post">
            <video class="feed-video" loop muted playsinline autoplay src="https://assets.mixkit.co/videos/preview/mixkit-tree-with-yellow-flowers-1173-large.mp4"></video>
            <div class="feed-ui-right">
                <div class="feed-btn" onclick="this.style.color='red'"><i class="fas fa-heart"></i><span>1.2k</span></div>
                <div class="feed-btn"><i class="fas fa-comment"></i><span>12</span></div>
                <div class="feed-btn"><i class="fas fa-share"></i><span>Share</span></div>
            </div>
            <div class="feed-ui-bottom">
                <p style="font-weight:bold; margin-bottom:5px;">@tech_nick</p>
                <p>Mein erster Post auf meiner neuen App! 🚀 #coding #startup</p>
            </div>
        </div>
        <div class="video-post">
            <video class="feed-video" loop muted playsinline src="https://assets.mixkit.co/videos/preview/mixkit-set-of-islands-in-the-ocean-1226-large.mp4"></video>
            <div class="feed-ui-right">
                <div class="feed-btn"><i class="fas fa-heart"></i><span>850</span></div>
                <div class="feed-btn"><i class="fas fa-comment"></i><span>5</span></div>
                <div class="feed-btn"><i class="fas fa-share"></i><span>Share</span></div>
            </div>
            <div class="feed-ui-bottom">
                <p style="font-weight:bold; margin-bottom:5px;">@travel_queen</p>
                <p>Wunderschöner Sonnenuntergang am Meer. 🌊</p>
            </div>
        </div>
    </div>

    <div id="live-container">
        <div id="local-player"></div>
        <div id="pk-bar"><div id="pk-progress"></div></div>
        <div id="live-ui">
            <div id="chat-flow"></div>
            <div class="live-sidebar">
                <div class="feed-btn" onclick="sendGift()"><i class="fas fa-gift" style="color:#face15;"></i><span>Gift</span></div>
                <div class="feed-btn" onclick="pinProduct('App Merch', '29')"><i class="fas fa-shopping-cart" style="color:#face15;"></i><span>Shop</span></div>
                <div class="feed-btn" onclick="location.reload()"><i class="fas fa-sync-alt"></i></div>
            </div>
        </div>
    </div>

    <div id="gate">
        <i class="fab fa-tiktok" style="font-size:70px; margin-bottom:10px;"></i>
        <h2>GLIMPSE V116</h2>
        <button onclick="initApp()">APP STARTEN</button>
    </div>

    <script>
        let currentMode = 'feed';
        const client = AgoraRTC.createClient({ mode: "live", codec: "vp8" });
        let localTracks = { videoTrack: null, audioTrack: null };

        function initApp() {
            document.getElementById('gate').style.display = 'none';
            // Startet Autoplay für das erste Video
            document.querySelector('.feed-video').play();
        }

        function switchTab(mode) {
            currentMode = mode;
            document.getElementById('tab-feed').classList.toggle('nav-active', mode === 'feed');
            document.getElementById('tab-live').classList.toggle('nav-active', mode === 'live');
            
            document.getElementById('feed-container').style.display = mode === 'feed' ? 'block' : 'none';
            document.getElementById('live-container').style.display = mode === 'live' ? 'block' : 'none';

            if(mode === 'live' && !localTracks.videoTrack) {
                setupLiveStream();
            }
        }

        async function setupLiveStream() {
            try {
                [localTracks.audioTrack, localTracks.videoTrack] = await AgoraRTC.createMicrophoneAndCameraTracks();
                localTracks.videoTrack.play("local-player");
                
                await client.setClientRole("host");
                const uid = await client.join("DEINE_APP_ID", "glimpse_live", null, null);
                await client.publish([localTracks.audioTrack, localTracks.videoTrack]);
                
                pushMsg("System", "Live-Stream aktiv! 🚀");
                startViewerSimulation();
            } catch(e) { console.error(e); }
        }

        function pushMsg(u, t) {
            const f = document.getElementById('chat-flow');
            const m = document.createElement('div');
            m.className = 'm';
            m.innerHTML = `<b>${u}:</b> ${t}`;
            f.appendChild(m);
        }

        function sendGift() {
            pushMsg("GIFT", "hat eine Rose gesendet! 🌹");
            document.getElementById('pk-bar').style.display = 'block';
            if(navigator.vibrate) navigator.vibrate(100);
        }

        function pinProduct(n, p) {
            pushMsg("Shop", `Produkt: ${n} (${p}€)`);
        }

        function startViewerSimulation() {
            setInterval(() => {
                const views = Math.floor(Math.random() * 50) + 1200;
                pushMsg("Stats", `${views} Zuschauer`);
            }, 5000);
        }
    </script>
</body>
</html>
