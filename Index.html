<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GLIMPSE V23 | CAMERA FORCE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon: #00f2ea; --magenta: #ff00ff; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: sans-serif; color: white; overflow: hidden; }
        #gate { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .gate-btn { padding: 20px 40px; border-radius: 30px; border: none; background: var(--neon); font-weight: 900; margin-top: 20px; }
        .app { display: none; height: 100%; position: relative; }
        #v-main { width: 100%; height: 100%; object-fit: cover; background: #222; }
        .sidebar { position: absolute; right: 20px; bottom: 150px; z-index: 5000; }
        .s-btn { width: 60px; height: 60px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 20px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--neon); margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="gate">
        <h1 style="color:var(--neon)">GLIMPSE V23</h1>
        <p>Kamera-Zugriff erforderlich für Weltneuheit</p>
        <button class="gate-btn" onclick="startWithCamera()">JETZT AKTIVIEREN</button>
    </div>

    <div id="app" class="app">
        <video id="v-main" autoplay playsinline muted></video>
        
        <div class="sidebar">
            <div class="s-btn" onclick="triggerFX()"><i class="fas fa-wand-magic-sparkles"></i></div>
            <div class="s-btn" onclick="location.reload()"><i class="fas fa-refresh"></i></div>
        </div>

        <div style="position:absolute; bottom:50px; width:100%; text-align:center;">
            <p>SQUAD-MODE AKTIV 🚀</p>
        </div>
    </div>

    <script>
        async function startWithCamera() {
            const video = document.getElementById('v-main');
            const gate = document.getElementById('gate');
            const app = document.getElementById('app');

            try {
                // Wir fragen die Kamera DIREKT beim Button-Klick ab (iOS verlangt User-Interaktion)
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: "user",
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }, 
                    audio: false 
                });
                
                video.srcObject = stream;
                
                // Wichtig für iPhone: Video muss "geladen" sein
                video.onloadedmetadata = () => {
                    video.play();
                    gate.style.display = 'none';
                    app.style.display = 'block';
                };

            } catch (err) {
                console.error("Fehler:", err);
                alert("Kamera-Fehler! Bitte gehe zu:\nEinstellungen > Safari > Kamera > Erlauben.\n\nFehler-Details: " + err.name);
            }
        }

        function triggerFX() {
            const v = document.getElementById('v-main');
            v.style.filter = "hue-rotate(90deg) invert(1)";
            setTimeout(() => v.style.filter = "none", 1000);
            if(navigator.vibrate) navigator.vibrate(50);
        }
    </script>
</body>
</html>
