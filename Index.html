<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GLIMPSE PRO - TikTok Clone</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --tiktok-red: #ff0050; --tiktok-cyan: #00f2ea; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: 'Proxima Nova', sans-serif; color: white; }

        /* VIDEO FEED */
        .feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .video-card { height: 100vh; scroll-snap-align: start; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* SIDEBAR INTERACTION */
        .side-bar { position: absolute; right: 10px; bottom: 100px; display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 10; }
        .icon-group { text-align: center; cursor: pointer; }
        .icon-group i { font-size: 32px; text-shadow: 1px 1px 5px rgba(0,0,0,0.5); }
        .icon-group span { display: block; font-size: 12px; margin-top: 4px; font-weight: bold; }
        .liked { color: var(--tiktok-red); }

        /* LIVE OVERLAY */
        #live-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; z-index: 9999; }
        #camera-preview { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .live-tools { position: absolute; bottom: 50px; width: 100%; text-align: center; }
        .go-live-btn { background: var(--tiktok-red); border: none; color: white; padding: 15px 40px; border-radius: 30px; font-size: 20px; font-weight: bold; box-shadow: 0 0 20px var(--tiktok-red); }
        .close-live { position: absolute; top: 40px; right: 20px; font-size: 30px; z-index: 10000; }

        /* CHAT / COMMENTS */
        #comment-section { position: fixed; bottom: 0; width: 100%; height: 60%; background: white; border-radius: 15px 15px 0 0; color: black; display: none; z-index: 2000; transition: transform 0.3s; }
        .comment-header { padding: 15px; text-align: center; border-bottom: 1px solid #eee; font-weight: bold; }
        #comment-list { height: 70%; overflow-y: auto; padding: 15px; }
        .comment-input { display: flex; padding: 10px; border-top: 1px solid #eee; }
        .comment-input input { flex: 1; border: 1px solid #ddd; border-radius: 20px; padding: 10px; outline: none; }

        /* NAVIGATION */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 0.5px solid #333; z-index: 1000; }
        .nav-item { text-align: center; color: #8a8a8e; font-size: 10px; }
        .nav-item.active { color: white; }
        .plus-icon { background: linear-gradient(to right, var(--tiktok-cyan), var(--tiktok-red)); padding: 4px 14px; border-radius: 10px; color: black; font-size: 20px; }
    </style>
</head>
<body>

    <div id="main-feed" class="feed">
        <div class="video-card">
            <video src="https://www.w3schools.com/html/mov_bbb.mp4" loop muted autoplay playsinline></video>
            <div class="side-bar">
                <div class="icon-group" onclick="toggleLike(this)"><i class="fa-solid fa-heart"></i><span>1.4M</span></div>
                <div class="icon-group" onclick="openComments()"><i class="fa-solid fa-comment-dots"></i><span>45.2K</span></div>
                <div class="icon-group"><i class="fa-solid fa-share"></i><span>Teilen</span></div>
            </div>
        </div>
    </div>

    <div id="live-screen">
        <span class="close-live" onclick="stopLive()">✕</span>
        <video id="camera-preview" autoplay playsinline></video>
        <div class="live-tools">
            <button class="go-live-btn" onclick="startBroadcasting()">JETZT LIVE GEHEN</button>
        </div>
    </div>

    <div id="comment-section">
        <div class="comment-header">Kommentare <span onclick="closeComments()" style="float:right">✕</span></div>
        <div id="comment-list"></div>
        <div class="comment-input">
            <input type="text" id="new-comment" placeholder="Kommentieren...">
            <button onclick="addComment()" style="border:none; background:none; color:var(--tiktok-red); font-weight:bold">Senden</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active"><i class="fa-solid fa-house" style="font-size:20px"></i><br>Home</div>
        <div class="nav-item" onclick="startLiveMode()"><div class="plus-icon">+</div></div>
        <div class="nav-item" onclick="alert('Profil bald verfügbar!')"><i class="fa-solid fa-user" style="font-size:20px"></i><br>Profil</div>
    </div>

    <script>
        // LIVE GEHEN (KAMERA AKTIVIEREN)
        let videoStream;
        async function startLiveMode() {
            document.getElementById('live-screen').style.display = 'block';
            try {
                videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
                document.getElementById('camera-preview').srcObject = videoStream;
            } catch (e) { alert("Kamera-Fehler: " + e); }
        }

        function stopLive() {
            if(videoStream) videoStream.getTracks().forEach(t => t.stop());
            document.getElementById('live-screen').style.display = 'none';
        }

        function startBroadcasting() {
            const btn = document.querySelector('.go-live-btn');
            btn.innerText = "DU BIST LIVE 🔴";
            btn.style.background = "#444";
        }

        // LIKES
        function toggleLike(el) {
            el.classList.toggle('liked');
        }

        // KOMMENTARE
        function openComments() { document.getElementById('comment-section').style.display = 'block'; }
        function closeComments() { document.getElementById('comment-section').style.display = 'none'; }
        
        function addComment() {
            const inp = document.getElementById('new-comment');
            if(inp.value) {
                const div = document.createElement('div');
                div.innerHTML = `<b>User:</b> ${inp.value}<hr>`;
                document.getElementById('comment-list').appendChild(div);
                inp.value = "";
            }
        }
    </script>
</body>
</html>
