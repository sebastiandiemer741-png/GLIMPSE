<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GLIMPSE OMNI-ONE | The Evolution</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --accent: #00f2ea; 
            --gradient: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); 
            --glass: rgba(255,255,255,0.1); 
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: -apple-system, system-ui, sans-serif; color: white; overflow: hidden; }

        /* --- LOGIN GATE --- */
        #gate { 
            position: fixed; inset: 0; background: radial-gradient(circle at center, #111, #000); 
            z-index: 100000; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: 1s cubic-bezier(0.8, 0, 0.2, 1); 
        }
        .logo-glow { 
            font-size: 55px; font-weight: 900; background: var(--gradient); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.2)); margin-bottom: 40px; 
            animation: pulse 3s infinite;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        
        .gate-input { 
            width: 85%; max-width: 400px; background: #0a0a0a; border: 1px solid #333; 
            padding: 22px; border-radius: 25px; color: white; text-align: center; 
            font-size: 18px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); 
        }
        .gate-btn { 
            width: 85%; max-width: 400px; margin-top: 20px; padding: 20px; 
            border-radius: 25px; border: none; background: white; color: black; 
            font-weight: 900; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; 
        }

        /* --- APP CORE --- */
        .app-shell { display: none; height: 100%; position: relative; }
        
        /* STORIES (INSTA-STYLE) */
        .story-bar { 
            position: fixed; top: 45px; width: 100%; height: 110px; 
            display: flex; gap: 15px; padding: 10px 20px; z-index: 5000; 
            overflow-x: auto; scrollbar-width: none; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); 
        }
        .story-bar::-webkit-scrollbar { display: none; }
        .story { flex-shrink: 0; width: 72px; height: 72px; border-radius: 50%; background: var(--gradient); padding: 3px; position: relative; }
        .story img { width: 100%; height: 100%; border-radius: 50%; border: 2px solid #000; object-fit: cover; }
        .story-name { position: absolute; bottom: -22px; left: 50%; transform: translateX(-50%); font-size: 11px; white-space: nowrap; }

        /* FEED (TIKTOK-STYLE) */
        .feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .v-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* COMMUNITY CHAT OVERLAY */
        #community-overlay { 
            position: absolute; bottom: 120px; left: 15px; width: 280px; 
            max-height: 220px; overflow-y: auto; z-index: 2000; pointer-events: none; 
        }
        .chat-bubble { 
            background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); 
            padding: 10px 15px; border-radius: 15px; margin-bottom: 8px; 
            font-size: 13px; border-left: 3px solid var(--accent); 
            animation: slideIn 0.3s ease-out; 
        }
        @keyframes slideIn { from { transform: translateX(-30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* SIDEBAR ACTIONS */
        .side-ui { position: absolute; right: 15px; bottom: 140px; display: flex; flex-direction: column; gap: 28px; z-index: 1000; }
        .ui-btn { 
            width: 55px; height: 55px; background: var(--glass); 
            backdrop-filter: blur(25px); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 8px 32px rgba(0,0,0,0.4); 
        }
        .ui-btn i { font-size: 26px; }

        /* HOLOGRAMM LIVE (NEUHEIT) */
        #holo-stream { 
            position: fixed; top: 170px; right: 20px; width: 125px; height: 125px; 
            border-radius: 35px; border: 2.5px solid var(--accent); overflow: hidden; 
            display: none; z-index: 8000; box-shadow: 0 0 40px rgba(0,242,234,0.5); 
            animation: floating 4s infinite ease-in-out; 
        }
        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        #cam-input { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        /* BOTTOM NAV */
        .nav { 
            position: fixed; bottom: 0; width: 100%; height: 90px; 
            background: rgba(0,0,0,0.95); backdrop-filter: blur(30px); 
            border-top: 0.5px solid #222; display: flex; 
            justify-content: space-around; align-items: center; 
            padding-bottom: 30px; z-index: 9000; 
        }
        .nav i { font-size: 24px; color: #555; transition: 0.3s; }
        .nav i.active { color: white; text-shadow: 0 0 10px white; }
        .plus-btn { 
            width: 50px; height: 35px; background: white; color: black; 
            border-radius: 12px; display: flex; align-items: center; 
            justify-content: center; font-weight: 900; font-size: 22px; 
        }
    </style>
</head>
<body>

            <div class="story"><img src="https://i.pravatar.cc/150?u=1"><div class="story-name">Live_Lukas</div></div>

                <div style="position:absolute; bottom:125px; left:20px; width:75%;">
                    <h3 id="user-display" style="margin:0; font-size:22px; text-shadow: 0 2px 10px rgba(0,0,0,0.5);">@User</h3>
                    <p style="opacity:0.8; font-size:14px; margin-top:5px; line-height:1.4;">OMNI-ONE: TikTok + Instagram + Live Community. Die ultimative Neuheit. 🌍✨</p>
                </div>
            </div>
        </div>

        <div id="holo-stream">
            <video id="cam-input" autoplay playsinline></video>
        </div>

        <div class="nav">
            <i class="fas fa-house active"></i>
            <i class="fas fa-users" onclick="alert('Community-Liste wird geladen...')"></i>
            <div class="plus-btn" onclick="toggleLive()">+</div>
            <i class="fas fa-message" onclick="addChatMessage()"></i>
            <i class="fas fa-user-astronaut" onclick="alert('Profil: ' + localStorage.getItem('omni_user'))"></i>
        </div>
    </div>
