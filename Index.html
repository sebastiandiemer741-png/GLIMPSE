<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GLIMPSE V106 | HYBRID CORE</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --tt-pink: #ff0050; --tt-cyan: #00f2ea; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { height: 100%; background: #000; font-family: -apple-system, sans-serif; color: white; overflow: hidden; position: fixed; width: 100%; }

        /* EBENE 1: AGORA VIDEO VIEW (rtcEngine) */
        #video-view { position: fixed; inset: 0; z-index: 1; background: #0a0a0a; }
        #local-player { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        /* EBENE 2: GRADIENT OVERLAY (BoxDecoration) */
        #ui-gradient { 
            position: fixed; inset: 0; 
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 50%, rgba(0,0,0,0.4) 100%); 
            z-index: 2; pointer-events: none; 
        }

        /* EBENE 3: CHAT LISTVIEW (Positioned bottom left) */
        #chat-list { 
            position: absolute; bottom: 100px; left: 15px; 
            width: 260px; height: 200px; 
            display: flex; flex-direction: column; justify-content: flex-end; 
            pointer-events: none; z-index: 10; 
        }
        .chat-msg { 
            font-size: 16px; margin-bottom: 6px; 
            text-shadow: 0 1px 3px rgba(0,0,0,0.9); 
            animation: fadeIn 0.3s ease-out; 
        }
        .user-tag { font-weight: bold; color: var(--tt-cyan); margin-right: 6px; }

        /* EBENE 4: INTERAKTIONS-BUTTONS (Sidebar right) */
        #sidebar-right { 
            position: absolute; right: 15px; bottom: 120px; 
            display: flex; flex-direction: column; align-items: center; gap: 25px; 
            z-index: 100; 
        }
        .action-node { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .action-node i { font-size: 35px; filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); }
        .action-node span { font-size: 12px; font-weight: 500; }

        /* EBENE 5: TEXTFIELD INPUT (Positioned bottom) */
        #input-container { 
            position: fixed; bottom: 25px; left: 10px; right: 10px; 
            display: flex; gap: 10px; z-index: 1000; 
        }
        #text-input { 
            flex: 1; background: rgba(255,255,255,0.2); 
            border: none; padding: 14px 22px; border-radius: 30px; 
            color: white; font-size: 16px; outline: none; backdrop-filter: blur(15px); 
        }
        .btn-send { 
            width: 50px; height: 50px; background: var(--tt-pink); 
            border: none; border-radius: 50%; color: white; 
            display: flex; align-items: center; justify-content: center; 
        }

        /* GATE / PERMISSION HANDLER UI */
        #gate { 
            position: fixed; inset: 0; background: #000; 
            z-index: 10000; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; text-align: center; 
        }
        #gate h1 { letter-spacing: 5px; margin-bottom: 20px; }
        #gate button { 
            background: #fff; color: #000; border: none; 
            padding: 20px 60px; border-radius: 40px; 
            font-weight: 900; font-size: 18px; cursor: pointer; 
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

    <div id="video-view">
        <div id="local-player"></div>
    </div>

    <div id="ui-gradient"></div>

    <div id="chat-list"></div>

    <div id="sidebar-right">
        <div class="action-node"><i class="fas fa-heart" style="color:#ff2d55;"></i><span>1.2k</span></div>
        <div class="action-node" onclick="gift()"><i class="fas fa-gift" style="color:#face15;"></i><span>Geschenk</span></div>
        <div class="action-node"><i class="fas fa-share" style="color:white;"></i><span>Teilen</span></div>
        <div class="action-node" onclick="location.reload()"><i class="fas fa-sync-alt" style="color:white; font-size:25px;"></i></div>
    </div>

    <div id="input-container">
        <input type="text" id="text-input" placeholder="Sag etwas..." onkeypress="if(event.key==='Enter') send()">
        <button class="btn-send" onclick="send()"><i class="fas fa-paper-plane"></i></button>
    </div>

    <div id="gate">
        <i class="fab fa-tiktok" style="font-size:60px; margin-bottom:20px;"></i>
        <h1>GLIMPSE V106</h1>
        <p style="opacity:0.5; margin-bottom:30px;">RTC Engine & Permission Handler ready</p>
        <button onclick="setupVideoStreaming()">INITIALIZE LIVE</button>
    </div>

    <script>
        let localTracks = { videoTrack: null, audioTrack: null };
        let client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });

        // ÜBERSETZUNG DEINES FLUTTER PERMISSION HANDLERS
        async function setupVideoStreaming() {
            try {
                // Permission Request (Kamera & Mikro)
                [localTracks.audioTrack, localTracks.videoTrack] = await AgoraRTC.createMicrophoneAndCameraTracks();
                
                // UI Update (setState Äquivalent)
                document.getElementById('gate').style.display = 'none';
                localTracks.videoTrack.play("local-player");

                pushMsg("System", "RTC Engine verbunden. Broadcaster aktiv.");
            } catch (e) {
                console.error(e);
                alert("Bitte Kamera- und Mikrofonrechte in Safari erlauben!");
            }
        }

        function send() {
            const input = document.getElementById('text-input');
            if(input.value.trim()) {
                pushMsg("User", input.value);
                input.value = "";
            }
        }

        function pushMsg(user, text) {
            const list = document.getElementById('chat-list');
            const div = document.createElement('div');
            div.className = 'chat-msg';
            div.innerHTML = `<span class="user-tag">${user}:</span> ${text}`;
            list.appendChild(div);
            if(list.children.length > 7) list.removeChild(list.firstChild);
        }

        function gift() {
            pushMsg("System", "Du hast ein Geschenk gesendet! 🎁");
            if(navigator.vibrate) navigator.vibrate(100);
        }
    </script>
</body>
</html>
