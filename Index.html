<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GLIMPSE V59 | REAL CHAT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --tt-red: #ff0050; --tt-cyan: #00f2ea; --gold: #ffd700; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { height: 100%; background: #000; font-family: -apple-system, sans-serif; color: white; overflow: hidden; position: fixed; width: 100%; }

        /* --- VIDEO LAYER --- */
        #v { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; transform: scaleX(-1); }
        #heart-container { position: fixed; inset: 0; z-index: 200; pointer-events: none; }

        /* --- HUD --- */
        .hud { position: relative; z-index: 100; height: 100%; display: none; flex-direction: column; padding: 50px 15px 20px; }

        /* CHAT SYSTEM - REPARIERT */
        #chat-zone { position: absolute; bottom: 90px; left: 15px; width: 75%; height: 200px; display: flex; flex-direction: column; justify-content: flex-end; overflow: hidden; pointer-events: none; }
        .msg { background: rgba(0,0,0,0.3); backdrop-filter: blur(5px); padding: 6px 12px; border-radius: 12px; font-size: 13px; margin-bottom: 5px; animation: slideIn 0.2s ease; width: fit-content; pointer-events: auto; }
        .msg b { color: var(--tt-cyan); margin-right: 5px; }
        .msg.me { border-left: 3px solid var(--tt-red); background: rgba(255,0,80,0.2); }

        /* INPUT DOCK - ECHTE FUNKTION */
        .dock { position: fixed; bottom: 0; width: 100%; height: 70px; display: flex; align-items: center; padding: 0 15px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); z-index: 300; }
        #user-input { flex: 1; background: rgba(255,255,255,0.2); border: none; padding: 12px 18px; border-radius: 25px; font-size: 14px; color: white; outline: none; }
        .send-btn { margin-left: 15px; font-size: 24px; color: var(--tt-cyan); }

        /* UI ELEMENTS */
        .sidebar { position: absolute; right: 10px; top: 150px; display: flex; flex-direction: column; gap: 15px; z-index: 250; }
        .tool { width: 45px; height: 45px; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-15px); } to { opacity: 1; transform: translateX(0); } }
        #gate { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body onclick="spawnHeart(event)">

    <video id="v" autoplay playsinline muted></video>
    <div id="heart-container"></div>

    <div id="gate">
        <h1 style="letter-spacing: 10px; margin-bottom: 30px;">PRO LIVE V59</h1>
        <button onclick="startApp()" style="background:var(--tt-red); color:white; border:none; padding:20px 60px; border-radius:40px; font-weight:900; font-size:18px;">JETZT LIVE GEHEN</button>
    </div>

    <div id="app" class="hud">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div style="background:rgba(0,0,0,0.5); padding:6px 12px; border-radius:20px; font-size:11px;"><b>Sovereign_Live</b> | 1.4k Zuschauer</div>
            <div onclick="location.reload()" style="font-size:24px; padding:10px;"><i class="fas fa-times"></i></div>
        </div>

        <div class="sidebar">
            <div class="tool" onclick="triggerGift()"><i class="fas fa-gift" style="color:var(--gold)"></i></div>
            <div class="tool"><i class="fas fa-share"></i></div>
        </div>

        <div id="chat-zone">
            <div class="msg"><b>System:</b> Chat aktiv. Sei freundlich! 🛡️</div>
        </div>

        <form class="dock" onsubmit="sendMessage(event)">
            <input type="text" id="user-input" placeholder="Kommentieren..." autocomplete="off">
            <button type="submit" class="send-btn" style="background:none; border:none;"><i class="fas fa-paper-plane"></i></button>
        </form>
    </div>

    <script>
        async function startApp() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                document.getElementById('v').srcObject = s;
                document.getElementById('gate').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                runBotChat();
            } catch (e) { alert("Cam-Fehler."); }
        }

        // EIGENE NACHRICHT SENDEN
        function sendMessage(e) {
            e.preventDefault();
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            
            if(text !== "") {
                const chat = document.getElementById('chat-zone');
                const m = document.createElement('div');
                m.className = 'msg me';
                m.innerHTML = `<b>Du:</b> ${text}`;
                chat.appendChild(m);
                input.value = "";
                input.blur(); // Tastatur schließen
                
                if(chat.children.length > 6) chat.removeChild(chat.firstChild);
                if(navigator.vibrate) navigator.vibrate(10);
            }
        }

        // BOT CHAT SIMULATION
        function runBotChat() {
            const users = ["Rico", "Sarah", "Max", "Lia", "Kev"];
            const words = ["Mega Stream!", "G-Power geschickt ⚡", "Hammer!", "Hi aus Berlin!", "💎💎💎"];
            setInterval(() => {
                const chat = document.getElementById('chat-zone');
                const m = document.createElement('div');
                m.className = 'msg';
                m.innerHTML = `<b>${users[Math.floor(Math.random()*5)]}</b> ${words[Math.floor(Math.random()*5)]}`;
                chat.appendChild(m);
                if(chat.children.length > 6) chat.removeChild(chat.firstChild);
            }, 3000);
        }

        function spawnHeart(e) {
            if(document.getElementById('app').style.display !== 'flex' || e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
            const container = document.getElementById('heart-container');
            const heart = document.createElement('div');
            heart.innerHTML = '<i class="fas fa-heart"></i>';
            heart.style.position = 'absolute';
            heart.style.left = e.clientX + 'px';
            heart.style.top = e.clientY + 'px';
            heart.style.color = "#ff0050";
            heart.style.fontSize = "24px";
            heart.style.animation = "slideUp 1s ease-out forwards";
            container.appendChild(heart);
            setTimeout(() => heart.remove(), 1000);
        }

        function triggerGift() {
            alert("Geschenk erhalten! 💎 +500 G-Power");
            if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
        }
    </script>
</body>
</html>
