<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OMNI-ONE | WORLD FIRST</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --neon: #00f2ea; 
            --magenta: #ff00ff;
            --gradient: linear-gradient(135deg, #00f2ea, #ff00ff);
            --glass: rgba(255,255,255,0.1); 
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Inter', -apple-system, sans-serif; color: white; overflow: hidden; }

        /* --- QUANTUM GATE (LOGIN) --- */
        #gate { 
            position: fixed; inset: 0; background: #000; z-index: 100000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: 1.2s cubic-bezier(0.9, 0, 0.1, 1); 
        }
        .logo-ring {
            width: 120px; height: 120px; border: 4px solid var(--neon); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 50px var(--neon); animation: rotate 4s linear infinite;
        }
        @keyframes rotate { 0% { transform: rotate(0deg); border-color: var(--neon); } 50% { border-color: var(--magenta); box-shadow: 0 0 50px var(--magenta); } 100% { transform: rotate(360deg); border-color: var(--neon); } }
        
        .gate-input { 
            width: 80%; max-width: 400px; background: rgba(255,255,255,0.05); border: 1px solid #222; 
            padding: 20px; border-radius: 30px; color: white; text-align: center; margin-top: 50px; font-size: 18px;
        }
        .gate-btn { 
            width: 80%; max-width: 400px; margin-top: 20px; padding: 20px; 
            border-radius: 30px; border: none; background: var(--gradient); color: white; 
            font-weight: 900; text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 10px 30px rgba(0,242,234,0.3);
        }

        /* --- OMNI CORE --- */
        .app-shell { display: none; height: 100%; position: relative; }
        
        /* THE SPATIAL FEED */
        .feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .v-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; transition: transform 0.5s; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* COMMUNITY LIVE CHAT (SPATIAL) */
        #chat-flow { 
            position: absolute; bottom: 130px; left: 20px; width: 75%; 
            max-height: 250px; overflow-y: auto; z-index: 2000; pointer-events: none; 
        }
        .msg { 
            background: rgba(0,0,0,0.3); backdrop-filter: blur(15px); 
            padding: 12px 18px; border-radius: 20px 20px 20px 0; margin-bottom: 10px; 
            font-size: 14px; border-left: 4px solid var(--neon); 
            animation: emerge 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        @keyframes emerge { from { transform: scale(0.5) translateY(20px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }

        /* FLOATING ACTION RADIUS */
        .action-radius { position: absolute; right: 20px; bottom: 140px; display: flex; flex-direction: column; gap: 25px; z-index: 3000; }
        .r-btn { 
            width: 60px; height: 60px; background: rgba(255,255,255,0.1); 
            backdrop-filter: blur(20px); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            border: 1px solid rgba(255,255,255,0.2); transition: 0.3s;
        }
        .r-btn i { font-size: 26px; color: white; }
        .r-btn.active { background: var(--gradient); box-shadow: 0 0 20px var(--neon); }

        /* THE HOLOGRAM (WORLD FIRST PIP) */
        #hologram { 
            position: fixed; top: 160px; right: 20px; width: 130px; height: 130px; 
            border-radius: 40px; border: 3px solid var(--neon); overflow: hidden; 
            display: none; z-index: 9000; box-shadow: 0 0 40px var(--neon); 
            animation: hover 3s infinite ease-in-out;
        }
        @keyframes hover { 0%, 100% { transform: translateY(0) rotate(2deg); } 50% { transform: translateY(-20px) rotate(-2deg); } }
        #cam-view { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        /* NAVIGATION 3.0 */
        .nav-3 { 
            position: fixed; bottom: 30px; left: 5%; width: 90%; height: 75px; 
            background: rgba(15,15,15,0.8); backdrop-filter: blur(30px); 
            border-radius: 30px; border: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-around; align-items: center; z-index: 10000;
        }
        .nav-3 i { font-size: 24px; color: rgba(255,255,255,0.3); transition: 0.4s; }
        .nav-3 i.active { color: var(--neon); text-shadow: 0 0 15px var(--neon); }
        .plus-sphere { 
            width: 60px; height: 60px; background: white; color: black; 
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; font-size: 30px; transform: translateY(-15px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="gate">
        <div class="logo-ring"><span style="font-weight:900; font-size:40px; animation: none;">O</span></div>
        <h1 style="margin-top:30px; letter-spacing:5px; font-weight:200;">OMNI ONE</h1>
        <input type="text" id="omni-id" class="gate-input" placeholder="WÄHLE DEINE IDENTITY">
        <button class="gate-btn" onclick="initiate()">IDENTITY AKTIVIEREN</button>
    </div>

    <div id="app" class="app-shell">
        <div class="feed">
            <div class="v-card">
                <video src="https://www.w3schools.com/html/mov_bbb.mp4" id="main-v" loop muted autoplay playsinline></video>
                
                <div id="chat-flow">
                    <div class="msg"><b>Omni-System:</b> Quantum-Netzwerk stabil. 🌐</div>
                    <div class="msg"><b>User_99:</b> Diese App ist die Zukunft! 🔥</div>
                </div>

                <div class="action-radius">
                    <div class="r-btn" onclick="this.classList.toggle('active')"><i class="fas fa-bolt"></i></div>
                    <div class="r-btn" onclick="sendSignal()"><i class="fas fa-comment-dots"></i></div>
                    <div class="r-btn"><i class="fas fa-share-nodes"></i></div>
                </div>
                
                <div style="position:absolute; bottom:120px; left:25px; pointer-events:none;">
                    <h2 id="display-id" style="margin:0; font-size:24px; color:var(--neon);">@User</h2>
                    <p style="opacity:0.6; font-size:14px;">The world's first spatial community app.</p>
                </div>
            </div>
        </div>

        <div id="hologram">
            <video id="cam-view" autoplay playsinline></video>
        </div>

        <div class="nav-3">
            <i class="fas fa-th-large active"></i>
            <i class="fas fa-search"></i>
            <div class="plus-sphere" onclick="toggleHolo()">+</div>
            <i class="fas fa-message" onclick="sendSignal()"></i>
            <i class="fas fa-user-circle"></i>
        </div>
    </div>

    <script>
        function initiate() {
            const id = document.getElementById('omni-id').value;
            if(id.length > 1) {
                document.getElementById('display-id').innerText = "@" + id;
                const gate = document.getElementById('gate');
                gate.style.transform = 'scale(2) opacity(0)';
                gate.style.opacity = '0';
                setTimeout(() => {
                    gate.style.display = 'none';
                    document.getElementById('app').style.display = 'block';
                }, 1000);
            }
        }

        function sendSignal() {
            const flow = document.getElementById('chat-flow');
            const m = document.createElement('div');
            m.className = 'msg';
            const user = document.getElementById('display-id').innerText;
            m.innerHTML = `<b>${user}:</b> Signal gesendet! 🚀`;
            flow.appendChild(m);
            flow.scrollTop = flow.scrollHeight;
        }

        let isLive = false;
        async function toggleHolo() {
            const h = document.getElementById('hologram');
            if(!isLive) {
                try {
                    const s = await navigator.mediaDevices.getUserMedia({video: {facingMode: "user"}});
                    document.getElementById('cam-view').srcObject = s;
                    h.style.display = 'block';
                    isLive = true;
                } catch(e) { alert("Cam Error"); }
            } else { h.style.display = 'none'; isLive = false; }
        }

        document.body.addEventListener('touchstart', () => { document.getElementById('main-v').muted = false; }, {once: true});
    </script>
</body>
</html>
