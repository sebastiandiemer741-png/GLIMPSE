<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GLIMPSE V110 | JUDGMENT</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --tt-red: #ff0050; --tt-cyan: #00f2ea; --glass: rgba(0,0,0,0.5); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { height: 100%; background: #000; font-family: -apple-system, system-ui, sans-serif; color: white; overflow: hidden; position: fixed; width: 100%; }

        /* EBENE 1: DYNAMISCHES LAYOUT (Übersetzung deiner buildLiveLayout Logik) */
        #court-container { 
            position: fixed; inset: 0; z-index: 1; 
            display: flex; flex-direction: column; /* Flutter Column Widget */
            background: #000; 
        }
        .video-slot { 
            flex: 1; position: relative; overflow: hidden; 
            background: #111; transition: all 0.4s ease;
        }
        #local-player { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); transition: filter 0.3s; }
        .remote-player-view { width: 100%; height: 100%; object-fit: cover; }

        /* EBENE 2: BEAUTY FILTER (Deine setBeautyEffectOptions Logik) */
        .beauty-active { filter: brightness(1.1) contrast(0.9) saturate(1.1) blur(0.4px); }

        /* EBENE 3: UI OVERLAY (Stack-Logik) */
        #ui-overlay { position: fixed; inset: 0; z-index: 10; pointer-events: none; padding: 20px; display: flex; flex-direction: column; }
        
        /* Oben: Streamer Info & LIVE Badge */
        #top-hud { display: flex; align-items: center; gap: 10px; margin-top: env(safe-area-inset-top); pointer-events: auto; }
        .host-pill { background: var(--glass); padding: 5px 15px 5px 5px; border-radius: 25px; display: flex; align-items: center; gap: 10px; backdrop-filter: blur(15px); }
        .avatar-circle { width: 34px; height: 34px; border-radius: 50%; background: var(--tt-red); display: flex; align-items: center; justify-content: center; border: 1.5px solid white; }
        .live-tag { background: var(--tt-red); padding: 5px 12px; border-radius: 6px; font-weight: 800; font-size: 12px; margin-left: auto; box-shadow: 0 0 10px rgba(255,0,80,0.5); }

        /* Unten: Chat (ListView reverse) */
        #chat-window { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; margin-bottom: 95px; width: 75%; }
        .chat-bubble { background: rgba(0,0,0,0.35); padding: 8px 14px; border-radius: 14px; font-size: 15px; margin-bottom: 6px; width: fit-content; backdrop-filter: blur(10px); border-left: 3px solid var(--tt-cyan); animation: slideIn 0.25s forwards; }

        /* Rechts: Interaktions-Buttons */
        #side-actions { position: absolute; right: 15px; bottom: 135px; display: flex; flex-direction: column; align-items: center; gap: 24px; pointer-events: auto; }
        .action-btn { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }
        .action-btn i { font-size: 34px; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.6)); }
        .action-btn span { font-size: 10px; font-weight: 700; text-transform: uppercase; }

        /* Ganz unten: Input */
        #bottom-dock { position: fixed; bottom: 30px; left: 15px; right: 15px; display: flex; gap: 12px; pointer-events: auto; }
        #chat-input { flex: 1; background: rgba(255,255,255,0.22); border: none; padding: 15px 22px; border-radius: 30px; color: white; outline: none; font-size: 16px; backdrop-filter: blur(20px); border: 0.5px solid rgba(255,255,255,0.1); }
        .send-icon { width: 52px; height: 52px; background: var(--tt-cyan); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; border: none; font-size: 20px; }

        /* Gate / Permission Handler Screen */
        #gate { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        #gate button { background: white; color: black; border: none; padding: 22px 75px; border-radius: 45px; font-weight: 900; font-size: 19px; margin-top: 30px; letter-spacing: 1px; }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body onclick="kickstartAudio()">

    <div id="court-container">
        <div class="video-slot" id="slot-host">
            <div id="local-player"></div>
        </div>
        <div class="video-slot" id="slot-guest" style="display: none;">
            <div id="remote-player-view" class="remote-player-view"></div>
        </div>
    </div>

    <div id="ui-overlay">
        <div id="top-hud">
            <div class="host-pill">
                <div class="avatar-circle"><i class="fas fa-user"></i></div>
                <div>
                    <p style="font-weight:bold; font-size:13px;">Live-Streamer</p>
                    <p style="font-size:11px; opacity:0.8;">1.2k Zuschauer</p>
                </div>
            </div>
            <div class="live-tag">LIVE</div>
        </div>

        <div id="chat-window"></div>

        <div id="side-actions">
            <div class="action-btn" onclick="toggleBeauty()"><i class="fas fa-magic" style="color:white;"></i><span>Filter</span></div>
            <div class="action-btn" onclick="toggleSplitScreen()"><i class="fas fa-user-plus" style="color:var(--tt-cyan);"></i><span>Gast</span></div>
            <div class="action-btn" onclick="sendGift()"><i class="fas fa-gift" style="color:#face15;"></i><span>Gift</span></div>
            <div class="action-btn" onclick="location.reload()"><i class="fas fa-sync-alt" style="font-size: 25px; margin-top: 10px;"></i></div>
        </div>

        <div id="bottom-dock">
            <input type="text" id="chat-input" placeholder="Sag etwas..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="send-icon" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="gate">
        <i class="fab fa-tiktok" style="font-size:75px; margin-bottom:15px;"></i>
        <h2 style="letter-spacing:5px;">GLIMPSE V110</h2>
        <p style="opacity:0.5; font-size:13px; margin-top:12px;">AGORA RTC ENGINE & SPLIT-COURT READY</p>
        <button onclick="initAgoraLive()">GO LIVE</button>
    </div>

    <script>
        let localTracks = { videoTrack: null, audioTrack: null };
        let isBeautyOn = false;

        // ÜBERSETZUNG DEINER INIT-LOGIK
        async function initAgoraLive() {
            try {
                // Permission Request (Kamera & Mikro)
                [localTracks.audioTrack, localTracks.videoTrack] = await AgoraRTC.createMicrophoneAndCameraTracks();
                
                document.getElementById('gate').style.display = 'none';
                localTracks.videoTrack.play("local-player");

                pushMsg("System", "Verbindung hergestellt. Broadcaster aktiv. 🚀");
            } catch (e) {
                alert("ZUGRIFF VERWEIGERT: Bitte Kamera-Rechte in Safari erlauben!");
            }
        }

        function kickstartAudio() { AgoraRTC.onAudioAutoplayFailed = () => { console.log("Audio kickstart"); }; }

        // DEINE LOGIK: buildLiveLayout (Split Screen Toggle)
        function toggleSplitScreen() {
            const guestSlot = document.getElementById('slot-guest');
            const isGuestVisible = guestSlot.style.display === 'block';

            if (!isGuestVisible) {
                // if (remoteUids.isNotEmpty)
                guestSlot.style.display = 'block';
                document.getElementById('remote-player-view').innerHTML = '<img src="https://i.pravatar.cc/600?u=guest" style="width:100%; height:100%; object-fit:cover;">';
                pushMsg("System", "Gast beigetreten. Split-Screen aktiv.");
            } else {
                // else (remoteUids.isEmpty)
                guestSlot.style.display = 'none';
                pushMsg("System", "Gast verlassen. Vollbild aktiv.");
            }
        }

        // DEINE LOGIK: setBeautyEffectOptions
        function toggleBeauty() {
            isBeautyOn = !isBeautyOn;
            const player = document.getElementById('local-player');
            if(isBeautyOn) {
                player.classList.add('beauty-active');
                pushMsg("AI", "Beauty-Filter (Hautglättung) aktiv ✨");
                if(navigator.vibrate) navigator.vibrate(60);
            } else {
                player.classList.remove('beauty-active');
                pushMsg("AI", "Filter deaktiviert.");
            }
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            if(input.value.trim()) {
                pushMsg("User", input.value);
                input.value = "";
            }
        }

        function pushMsg(user, text) {
            const list = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = 'chat-bubble';
            div.innerHTML = `<b style="color:var(--tt-cyan)">${user}:</b> ${text}`;
            list.appendChild(div);
            if(list.children.length > 7) list.removeChild(list.firstChild);
        }

        function sendGift() {
            pushMsg("User", "sendet ein GESCHENK! 🎁🪐");
            if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
        }
    </script>
</body>
</html>
