<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GLIMPSE V88 | PURE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --tt-pink: #ff0050; --tt-cyan: #00f2ea; --glass: rgba(0,0,0,0.4); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { height: 100%; background: #000; font-family: -apple-system, sans-serif; color: white; overflow: hidden; position: fixed; width: 100%; }

        /* --- VIDEO GRID --- */
        #grid { position: fixed; inset: 0; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 1px; background: #000; z-index: 1; }
        .slot { position: relative; background: #111; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .slot video, .slot img { width: 100%; height: 100%; object-fit: cover; }
        #v-host { transform: scaleX(-1); }
        .tag { position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,0.5); padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; backdrop-filter: blur(5px); z-index: 10; }
        .wait-icon { opacity: 0.2; font-size: 30px; }

        /* --- TOP BANNER (INVITE) --- */
        #invite-banner { position: fixed; top: 60px; left: 12px; right: 12px; background: linear-gradient(90deg, #ff0050, #007aff); padding: 12px; border-radius: 12px; display: none; justify-content: space-between; align-items: center; z-index: 9000; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: spring 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* --- CHAT AREA --- */
        #chat { position: absolute; bottom: 120px; left: 12px; width: 75%; height: 200px; display: flex; flex-direction: column; justify-content: flex-end; pointer-events: none; z-index: 2000; }
        .msg { background: rgba(0,0,0,0.25); padding: 6px 12px; margin-bottom: 4px; border-radius: 10px; font-size: 14px; width: fit-content; backdrop-filter: blur(5px); animation: slideIn 0.2s ease; }

        /* --- BOTTOM DOCK --- */
        #dock { position: fixed; bottom: 30px; width: 100%; padding: 0 12px; display: flex; gap: 10px; z-index: 5000; align-items: center; }
        #input { flex: 1; background: rgba(255,255,255,0.15); border: none; padding: 12px 18px; border-radius: 25px; color: white; outline: none; font-size: 16px; backdrop-filter: blur(10px); }
        .btn { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); color: white; border: none; }

        /* --- START --- */
        #gate { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        button#go-live { background: white; color: black; border: none; padding: 18px 60px; border-radius: 35px; font-weight: 800; font-size: 18px; box-shadow: 0 0 30px rgba(255,255,255,0.2); }

        @keyframes spring { from { transform: translateY(-100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="grid">
        <div class="slot"><video id="v-host" autoplay playsinline muted></video><div class="tag">Du (Host)</div></div>
        <div class="slot" id="s2"><i class="fas fa-user-plus wait-icon"></i><div class="tag">Warten...</div></div>
        <div class="slot" id="s3"><i class="fas fa-user-plus wait-icon"></i><div class="tag">Warten...</div></div>
        <div class="slot" id="s4"><i class="fas fa-user-plus wait-icon"></i><div class="tag">Warten...</div></div>
    </div>

    <div id="invite-banner">
        <div style="display:flex; align-items:center; gap:10px;">
            <img src="https://i.pravatar.cc/100?u=sarah" style="width:32px; border-radius:50%; border:1px solid white;">
            <span style="font-weight:700; font-size:13px;">Anfrage: Sarah_Live</span>
        </div>
        <button onclick="accept()" style="background:white; color:black; border:none; padding:6px 14px; border-radius:20px; font-weight:700; font-size:12px;">ANNEHMEN</button>
    </div>

    <div id="chat"></div>

    <div id="dock">
        <input type="text" id="input" placeholder="Kommentieren..." onkeypress="if(event.key==='Enter') send()">
        <button class="btn" onclick="requestToJoin()" style="color:var(--tt-cyan)"><i class="fas fa-video-plus"></i></button>
        <button class="btn" style="color:#face15"><i class="fas fa-gift"></i></button>
        <button class="btn" onclick="send()" style="background:var(--tt-pink)"><i class="fas fa-paper-plane"></i></button>
    </div>

    <div id="gate">
        <i class="fab fa-tiktok" style="font-size:50px; margin-bottom:20px;"></i>
        <button id="go-live" onclick="start()">GO LIVE</button>
    </div>

    <script>
        const v = document.getElementById('v-host');

        async function start() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}});
                v.srcObject = s;
                document.getElementById('gate').style.display = 'none';
                push("System", "Stream gestartet. ✅");
                // Simuliert Zuschauer-Anfrage nach 5 Sekunden
                setTimeout(() => { document.getElementById('invite-banner').style.display = 'flex'; }, 5000);
            } catch(e) { alert("Kamera erlauben!"); }
        }

        function send() {
            const i = document.getElementById('input');
            if(i.value.trim()) { push("Du", i.value); i.value = ""; }
        }

        function push(u, t) {
            const c = document.getElementById('chat');
            const m = document.createElement('div');
            m.className = 'msg';
            m.innerHTML = `<b style="color:rgba(255,255,255,0.7)">${u}:</b> ${t}`;
            c.appendChild(m);
            if(c.children.length > 6) c.removeChild(c.firstChild);
        }

        function requestToJoin() {
            // Dies simuliert, was passiert wenn ein Zuschauer drückt
            alert("Deine Anfrage wurde an den Host gesendet!");
            if(navigator.vibrate) navigator.vibrate(50);
        }

        function accept() {
            const s2 = document.getElementById('s2');
            s2.innerHTML = `<img src="https://i.pravatar.cc/400?u=sarah"><div class="tag">Sarah_Live</div>`;
            document.getElementById('invite-banner').style.display = 'none';
            push("System", "Sarah_Live ist dem Stream beigetreten!");
        }
    </script>
</body>
</html>
