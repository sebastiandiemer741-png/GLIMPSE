<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GLIMPSE X - Next Gen Social</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #00ffcc; --neon-red: #ff0055; --bg: #050505; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Inter', system-ui, sans-serif; color: white; }

        /* NEON-GLASS DESIGN */
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; }

        /* DER FEED */
        .feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .video-card { height: 100vh; scroll-snap-align: start; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.9); }

        /* SIDEBAR (RECHTS) */
        .side-bar { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 25px; z-index: 100; }
        .action-box { display: flex; flex-direction: column; align-items: center; transition: 0.2s; }
        .action-box i { font-size: 30px; filter: drop-shadow(0 0 5px rgba(0,0,0,0.8)); }
        .action-box span { font-size: 11px; font-weight: 700; margin-top: 5px; text-transform: uppercase; }
        .liked { color: var(--neon-red); transform: scale(1.2); }

        /* LIVE GEHEN - DAS "EXTRA" */
        #live-hub { position: fixed; inset: 0; background: #000; display: none; z-index: 5000; }
        #live-cam { width: 100%; height: 100%; object-fit: cover; }
        .live-overlay-ui { position: absolute; inset: 0; padding: 50px 20px; pointer-events: none; }
        .live-status { background: var(--neon-red); color: white; padding: 5px 15px; border-radius: 5px; font-weight: 800; animation: pulse 1s infinite; pointer-events: auto; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* GHOST CHAT */
        #ghost-chat { position: fixed; bottom: 80px; left: 15px; width: 70%; max-height: 200px; overflow-y: hidden; z-index: 1000; pointer-events: none; }
        .ghost-msg { background: rgba(0,0,0,0.4); padding: 8px 12px; border-radius: 10px; margin-bottom: 5px; font-size: 13px; animation: fadeOut 8s forwards; border-left: 3px solid var(--accent); }
        @keyframes fadeOut { 0% { opacity: 1; transform: translateY(0); } 80% { opacity: 1; } 100% { opacity: 0; transform: translateY(-20px); } }

        /* NAV BAR (X-DESIGN) */
        .nav-x { position: fixed; bottom: 20px; left: 5%; width: 90%; height: 65px; display: flex; justify-content: space-around; align-items: center; z-index: 4000; }
        .nav-link { color: rgba(255,255,255,0.5); font-size: 20px; transition: 0.3s; }
        .nav-link.active { color: var(--accent); text-shadow: 0 0 15px var(--accent); }
        .x-btn { width: 55px; height: 55px; background: white; color: black; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 0 20px rgba(255,255,255,0.4); transform: translateY(-10px); }

        /* COMMENTS */
        #comment-panel { position: fixed; bottom: 0; width: 100%; height: 50%; background: #111; border-radius: 25px 25px 0 0; display: none; z-index: 6000; flex-direction: column; }
        .panel-header { padding: 20px; border-bottom: 1px solid #222; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div class="feed" id="feed">
        <div class="video-card">
            <video src="https://www.w3schools.com/html/mov_bbb.mp4" loop muted autoplay playsinline></video>
            <div id="ghost-chat"></div>
            <div class="side-bar">
                <div class="action-box" onclick="toggleLike(this)"><i class="fas fa-bolt"></i><span>99k</span></div>
                <div class="action-box" onclick="openComments()"><i class="fas fa-comment-dots"></i><span>Chat</span></div>
                <div class="action-box" onclick="vibrateDevice()"><i class="fas fa-wave-square"></i><span>Feel</span></div>
            </div>
        </div>
    </div>

    <div id="live-hub">
        <video id="live-cam" autoplay playsinline></video>
        <div class="live-overlay-ui">
            <span class="live-status">X-STREAM LIVE</span>
            <div style="margin-top: 20px; font-size: 12px; opacity: 0.8;">MULTICAM AKTIV</div>
            <button onclick="closeLive()" style="position:absolute; top:45px; right:20px; background:none; border:none; color:white; font-size:30px; pointer-events:auto;">✕</button>
        </div>
    </div>

    <div class="nav-x glass">
        <div class="nav-link active" onclick="location.reload()"><i class="fas fa-compass"></i></div>
        <div class="x-btn" onclick="goLive()"><i class="fas fa-plus"></i></div>
        <div class="nav-link" onclick="alert('Glimpse X Profile')"><i class="fas fa-shield-halved"></i></div>
    </div>

    <div id="comment-panel">
        <div class="panel-header">Ghost Chat <span style="float:right" onclick="closeComments()">✕</span></div>
        <div id="panel-msgs" style="flex:1; overflow-y:auto; padding:20px;"></div>
        <div style="padding:20px; display:flex;">
            <input type="text" id="msg-input" placeholder="Nachricht schreiben..." style="flex:1; background:#222; border:none; color:white; padding:12px; border-radius:10px;">
            <button onclick="sendGhostMsg()" style="background:var(--accent); border:none; margin-left:10px; padding:10px 20px; border-radius:10px; font-weight:bold;">Senden</button>
        </div>
    </div>

    <script>
        let stream;

        function toggleLike(el) {
            el.classList.toggle('liked');
            if(el.classList.contains('liked')) {
                sendGhostMsg("Hat das Video geblitzt! ⚡");
            }
        }

        async function goLive() {
            document.getElementById('live-hub').style.display = 'block';
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
                document.getElementById('live-cam').srcObject = stream;
            } catch(e) { alert("Cam Error: " + e); }
        }

        function closeLive() {
            if(stream) stream.getTracks().forEach(t => t.stop());
            document.getElementById('live-hub').style.display = 'none';
        }

        function openComments() { document.getElementById('comment-panel').style.display = 'flex'; }
        function closeComments() { document.getElementById('comment-panel').style.display = 'none'; }

        function sendGhostMsg(text = null) {
            const input = document.getElementById('msg-input');
            const val = text || input.value;
            if(!val) return;

            const msg = document.createElement('div');
            msg.className = "ghost-msg";
            msg.innerText = val;
            document.getElementById('ghost-chat').appendChild(msg);
            
            if(!text) input.value = "";
            
            // Nachricht nach 8 Sekunden aus dem DOM entfernen
            setTimeout(() => msg.remove(), 8500);
        }

        function vibrateDevice() {
            if ("vibrate" in navigator) {
                navigator.vibrate([100, 50, 100]);
                alert("Haptisches Feedback simuliert! (Vibration)");
            } else {
                alert("Dein Browser unterstützt keine Vibration.");
            }
        }
    </script>
</body>
</html>
