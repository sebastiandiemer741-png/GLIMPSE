<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GLIMPSE V63 | BEYOND</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon-green: #00ff88; --ghost-white: rgba(255,255,255,0.6); --truth-red: #ff3b30; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { height: 100%; background: #000; font-family: sans-serif; color: white; overflow: hidden; }

        #v { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; transform: scaleX(-1); }
        
        /* TRUTH O METER */
        #truth-meter { position: absolute; top: 120px; left: 20px; width: 100px; height: 10px; background: #222; border-radius: 5px; z-index: 200; border: 1px solid rgba(255,255,255,0.2); overflow: hidden; }
        #truth-fill { height: 100%; width: 85%; background: var(--neon-green); transition: 0.5s; }
        .truth-label { position: absolute; top: 100px; left: 20px; font-size: 8px; font-weight: bold; z-index: 200; color: var(--neon-green); letter-spacing: 1px; }

        /* GHOST HANDS ANIMATION */
        .ghost-hand { position: absolute; z-index: 150; font-size: 80px; filter: drop-shadow(0 0 20px white); pointer-events: none; opacity: 0; }
        @keyframes ghostAttack { 
            0% { transform: scale(0.5) translate(0, 500px); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: scale(1.5) translate(var(--tx), var(--ty)); opacity: 0; }
        }

        /* HUD */
        .hud { position: relative; z-index: 100; height: 100%; display: none; flex-direction: column; padding: 50px 20px; }
        .sidebar { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 20px; }
        .btn-hex { width: 50px; height: 50px; background: rgba(255,255,255,0.1); border: 1px solid var(--neon-green); display: flex; align-items: center; justify-content: center; border-radius: 12px; backdrop-filter: blur(10px); }

        .chat { position: absolute; bottom: 100px; left: 20px; width: 70%; height: 150px; overflow: hidden; pointer-events: none; }
        .msg { background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 8px; font-size: 12px; margin-bottom: 5px; border-left: 2px solid var(--neon-green); animation: slide 0.3s ease; }
        
        @keyframes slide { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        #gate { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <video id="v" autoplay playsinline muted></video>
    
    <div class="truth-label">AUTHENTIZITÄT</div>
    <div id="truth-meter"><div id="truth-fill"></div></div>

    <div id="gate">
        <h1 style="letter-spacing: 15px; margin-bottom: 20px;">BEYOND</h1>
        <button onclick="startBeyond()" style="background:var(--neon-green); color:black; border:none; padding:18px 50px; border-radius:10px; font-weight:900;">ACTIVATE NEURAL STREAM</button>
    </div>

    <div id="app" class="hud">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div style="border: 1px solid var(--neon-green); padding: 5px 10px; border-radius: 5px; font-size: 10px;">LIVE // SENSE_ON</div>
            <div onclick="location.reload()"><i class="fas fa-power-off"></i></div>
        </div>

        <div class="sidebar">
            <div class="btn-hex" onclick="triggerGhost()"><i class="fas fa-hand-sparkles"></i></div>
            <div class="btn-hex" onclick="toggleTruth()"><i class="fas fa-eye"></i></div>
            <div class="btn-hex" onclick="alert('Community-Beat: ON')"><i class="fas fa-music"></i></div>
        </div>

        <div id="chat" class="chat"></div>

        <div style="position:fixed; bottom:30px; width:90%; left:5%; display:flex; gap:10px;">
            <input type="text" id="in" placeholder="Sende Gedanken..." style="flex:1; background:none; border: 1px solid rgba(255,255,255,0.3); padding:15px; border-radius:10px; color:white;">
        </div>
    </div>

    <script>
        async function startBeyond() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                document.getElementById('v').srcObject = s;
                document.getElementById('gate').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                runTruthEngine();
                simulateCommunity();
            } catch (e) { alert("Access Denied."); }
        }

        function runTruthEngine() {
            setInterval(() => {
                const val = Math.floor(Math.random() * 40 + 60);
                document.getElementById('truth-fill').style.width = val + "%";
                document.getElementById('truth-fill').style.background = val < 70 ? "var(--truth-red)" : "var(--neon-green)";
            }, 3000);
        }

        function triggerGhost() {
            const hand = document.createElement('div');
            hand.className = 'ghost-hand';
            hand.innerHTML = '🖐️';
            hand.style.setProperty('--tx', (Math.random() * 200 - 100) + 'px');
            hand.style.setProperty('--ty', (Math.random() * -400 - 100) + 'px');
            hand.style.left = "40%";
            hand.style.animation = "ghostAttack 1.5s ease-out forwards";
            document.body.appendChild(hand);
            if(navigator.vibrate) navigator.vibrate([30, 50, 30]);
            setTimeout(() => hand.remove(), 1500);
        }

        function toggleTruth() {
            const m = document.getElementById('truth-meter');
            m.style.display = m.style.display === 'none' ? 'block' : 'none';
        }

        function simulateCommunity() {
            const users = ["Nexus", "Void", "Echo", "Cyber"];
            setInterval(() => {
                const chat = document.getElementById('chat');
                const m = document.createElement('div');
                m.className = 'msg';
                m.innerHTML = `<b>${users[Math.floor(Math.random()*4)]}:</b> Sende Ghost-Hand!`;
                chat.appendChild(m);
                if(chat.children.length > 5) chat.removeChild(chat.firstChild);
                if(Math.random() > 0.7) triggerGhost();
            }, 4000);
        }
    </script>
</body>
</html>
