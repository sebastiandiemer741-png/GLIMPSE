<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GLIMPSE GENESIS PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --insta: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); 
            --neon: #00f2ea;
            --glass: rgba(255, 255, 255, 0.1);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: -apple-system, sans-serif; color: white; overflow: hidden; }

        /* --- LOGIN SCREEN --- */
        #login-screen { 
            position: fixed; inset: 0; background: #000; z-index: 99999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; 
        }
        .login-card { background: #111; padding: 30px; border-radius: 30px; width: 100%; border: 1px solid #222; text-align: center; }
        .input-field { width: 100%; padding: 16px; margin: 12px 0; border-radius: 15px; border: 1px solid #333; background: #000; color: white; font-size: 16px; }
        .btn-start { width: 100%; padding: 18px; border-radius: 15px; border: none; background: var(--insta); color: white; font-weight: bold; font-size: 18px; box-shadow: 0 10px 20px rgba(220, 39, 67, 0.3); }

        /* --- INSTA STORIES --- */
        .story-wrapper { 
            position: fixed; top: 45px; width: 100%; height: 115px; 
            display: flex; gap: 15px; padding: 10px 15px; overflow-x: auto; 
            z-index: 2000; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            scrollbar-width: none;
        }
        .story-wrapper::-webkit-scrollbar { display: none; }
        .story-ring { flex-shrink: 0; width: 72px; height: 72px; border-radius: 50%; background: var(--insta); padding: 3px; }
        .story-img { width: 100%; height: 100%; border-radius: 50%; border: 2px solid #000; object-fit: cover; }
        .story-user { font-size: 11px; text-align: center; margin-top: 5px; }

        /* --- TIKTOK FEED --- */
        .main-feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .video-container { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* --- INTERACTION SIDEBAR --- */
        .side-ui { position: absolute; right: 15px; bottom: 140px; display: flex; flex-direction: column; gap: 25px; z-index: 1000; align-items: center; }
        .user-avatar { width: 55px; height: 55px; border-radius: 50%; border: 2px solid #fff; margin-bottom: 10px; box-shadow: 0 0 15px rgba(255,255,255,0.3); }
        .ui-btn { text-align: center; cursor: pointer; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.9)); }
        .ui-btn i { font-size: 32px; }
        .ui-btn span { display: block; font-size: 12px; font-weight: bold; margin-top: 5px; }

        /* --- HOLO-LIVE (FUTURE FEATURE) --- */
        #holo-live-circle { 
            position: fixed; top: 180px; right: 20px; width: 120px; height: 120px; 
            border-radius: 50%; border: 3px solid var(--neon); overflow: hidden; 
            display: none; z-index: 5000; box-shadow: 0 0 30px var(--neon); 
            animation: floating-holo 4s infinite ease-in-out; 
        }
        @keyframes floating-holo { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        #live-cam { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        /* --- FUSION BOTTOM NAV --- */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; height: 90px; 
            background: rgba(0,0,0,0.9); backdrop-filter: blur(25px); 
            display: flex; justify-content: space-around; align-items: center; 
            padding-bottom: 30px; border-top: 0.5px solid #333; z-index: 9000; 
        }
        .nav-icon { font-size: 24px; color: #888; transition: 0.3s; }
        .nav-icon.active { color: white; }
        .btn-plus { background: white; color: black; width: 50px; height: 35px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1 style="margin:0; background: var(--insta); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">GENESIS</h1>
            <p style="color:#666; margin-bottom:20px;">Personalisiere dein Omni-Profil</p>
            <input type="text" id="input-username" class="input-field" placeholder="@nutzername">
            <input type="email" id="input-email" class="input-field" placeholder="E-Mail Adresse">
            <button class="btn-start" onclick="startApp()">PROFIL AKTIVIEREN</button>
        </div>
    </div>

    <div id="app-content" style="display: none;">
        
        <div class="story-wrapper">
            <div class="story-ring" onclick="alert('Lade deine Story...')">
                <div style="width:100%; height:100%; border-radius:50%; background:#222; display:flex; align-items:center; justify-content:center;">
                    <i class="fas fa-plus"></i>
                </div>
                <div class="story-user">Du</div>
            </div>
            <div class="story-ring"><img src="https://i.pravatar.cc/150?u=1" class="story-img"><div class="story-user">Lukas</div></div>
            <div class="story-ring"><img src="https://i.pravatar.cc/150?u=2" class="story-img"><div class="story-user">Sarah</div></div>
            <div class="story-ring"><img src="https://i.pravatar.cc/150?u=3" class="story-img"><div class="story-user">Marco</div></div>
        </div>

        <div class="main-feed" id="feed">
            <div class="video-container">
                <video src="https://www.w3schools.com/html/mov_bbb.mp4" id="v1" loop muted autoplay playsinline></video>
                
                <div class="side-ui">
                    <img src="https://i.pravatar.cc/150?u=me" class="user-avatar">
                    <div class="ui-btn" onclick="this.style.color='red'"><i class="fas fa-bolt"></i><span>1.2M</span></div>
                    <div class="ui-btn" onclick="alert('Chat wird geladen...')"><i class="fas fa-comment-dots"></i><span>12k</span></div>
                    <div class="ui-btn"><i class="fas fa-share-nodes"></i><span>Fusion</span></div>
                </div>

                <div style="position:absolute; bottom:110px; left:15px; width:70%;">
                    <div id="display-name" style="font-weight:bold; font-size:18px; margin-bottom:5px;">@User</div>
                    <div style="font-size:14px; opacity:0.9;">Glimpse Fusion Pro: Das ist die Zukunft von Social Media. 🔥 #evolution</div>
                </div>
            </div>
        </div>

        <div id="holo-live-circle">
            <video id="live-cam" autoplay playsinline></video>
        </div>

        <div class="bottom-nav">
            <i class="fas fa-house nav-icon active"></i>
            <i class="fas fa-magnifying-glass nav-icon"></i>
            <div class="btn-plus" onclick="toggleHoloLive()">+</div>
            <i class="fas fa-clapperboard nav-icon"></i>
            <i class="fas fa-user nav-icon" onclick="alert('Profil von ' + localStorage.getItem('glimpse_user'))"></i>
        </div>
    </div>

    <script>
        // APP INITIALISIERUNG
        function startApp() {
            const user = document.getElementById('input-username').value;
            if(user.length > 2) {
                localStorage.setItem('glimpse_user', user);
                document.getElementById('display-name').innerText = "@" + user;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
            } else {
                alert("Wähle einen @nutzernamen mit mindestens 3 Zeichen!");
            }
        }

        // HOLO-LIVE FUNKTION
        let isLive = false;
        let myStream;

        async function toggleHoloLive() {
            const holo = document.getElementById('holo-live-circle');
            if(!isLive) {
                try {
                    myStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
                    document.getElementById('live-cam').srcObject = myStream;
                    holo.style.display = 'block';
                    isLive = true;
                } catch(e) { alert("Kamera-Fehler: " + e); }
            } else {
                if(myStream) myStream.getTracks().forEach(t => t.stop());
                holo.style.display = 'none';
                isLive = false;
            }
        }

        // AUTO-UNMUTE BEI ERSTER BERÜHRUNG
        document.body.addEventListener('touchstart', () => {
            const video = document.getElementById('v1');
            video.muted = false;
        }, {once: true});
    </script>
</body>
</html>
