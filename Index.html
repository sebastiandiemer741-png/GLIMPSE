<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GLIMPSE V80 | ULTIMATE MASTER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --tt-pink: #ff0050; --tt-cyan: #00f2ea; --gold: #ffd700; --mod: #007aff; --pk-blue: #007aff; --pk-red: #ff2d55; --truth: #00ff88; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { height: 100%; background: #000; font-family: -apple-system, sans-serif; color: white; overflow: hidden; position: fixed; width: 100%; }

        /* --- VIDEO GRID --- */
        #video-grid { position: fixed; inset: 0; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 2px; background: #111; z-index: 1; }
        .v-slot { position: relative; background: #050505; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .v-slot video, .v-slot img { width: 100%; height: 100%; object-fit: cover; opacity: 0.9; }
        #v { transform: scaleX(-1); transition: 0.5s; }
        .thermal { filter: contrast(2) saturate(3) hue-rotate(90deg) invert(1) !important; }
        .slot-name { position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,0.6); padding: 2px 8px; border-radius: 5px; font-size: 10px; z-index: 10; border: 0.5px solid rgba(255,255,255,0.2); }

        /* --- BATTLE & SENSORS --- */
        #pk-bar { position: absolute; top: 110px; left: 5%; width: 90%; height: 16px; background: #333; border-radius: 8px; display: none; z-index: 200; overflow: hidden; border: 1.5px solid white; }
        #pk-b { height: 100%; width: 50%; background: var(--pk-blue); float: left; transition: 0.5s; }
        #pk-r { height: 100%; width: 50%; background: var(--pk-red); float: left; transition: 0.5s; }
        #challenge { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); background: linear-gradient(90deg, var(--tt-pink), var(--mod)); padding: 6px 20px; border-radius: 20px; font-size: 10px; font-weight: 900; z-index: 200; box-shadow: 0 0 15px var(--tt-pink); white-space: nowrap; }
        .truth-box { position: absolute; top: 115px; left: 15px; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 10px; border: 1px solid var(--truth); z-index: 200; }
        #t-fill { height: 4px; width: 80%; background: var(--truth); margin-top: 4px; transition: 1s; }

        /* --- CHAT --- */
        #chat { position: absolute; bottom: 120px; left: 15px; width: 75%; height: 180px; display: flex; flex-direction: column; justify-content: flex-end; pointer-events: none; z-index: 1000; }
        .msg { background: rgba(0,0,0,0.5); padding: 8px 12px; margin-bottom: 5px; border-radius: 15px; font-size: 13px; width: fit-content; border-left: 3px solid var(--tt-cyan); backdrop-filter: blur(5px); animation: slide 0.3s ease; }

        /* --- GUEST PANEL --- */
        #guest-panel { position: absolute; bottom: 0; left: 0; width: 100%; background: #0d0d0d; border-top-left-radius: 25px; border-top-right-radius: 25px; z-index: 2000; padding: 25px; transform: translateY(100%); transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); border-top: 2px solid var(--mod); }
        #guest-panel.open { transform: translateY(0); }
        .guest-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 15px; margin-bottom: 12px; }

        /* --- BUTTONS --- */
        .sidebar { position: absolute; right: 12px; top: 140px; display: flex; flex-direction: column; gap: 12px; z-index: 1100; }
        .s-btn { width: 50px; height: 50px; background: rgba(0,0,0,0.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(10px); }
        #req-btn { position: absolute; bottom: 110px; left: 15px; width: 55px; height: 55px; background: var(--mod); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 1100; border: 2px solid white; box-shadow: 0 0 20px var(--mod); }

        #lucky-box { position: absolute; top: 160px; left: 15px; background: rgba(0,0,0,0.8); border: 1.5px solid var(--gold); border-radius: 12px; padding: 8px; display: none; z-index: 250; align-items: center; gap: 10px; }

        #gate { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        @keyframes slide { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes heart { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-500px) scale(3); opacity: 0; } }
    </style>
</head>
<body onclick="spawnHeart(event)">

    <div id="video-grid">
        <div class="v-slot"><video id="v" autoplay playsinline muted></video><div class="slot-name">Du (Host)</div></div>
        <div class="v-slot empty" id="slot-2"><div class="slot-name">Warten...</div></div>
        <div class="v-slot empty" id="slot-3"><div class="slot-name">Warten...</div></div>
        <div class="v-slot empty" id="slot-4"><div class="slot-name">Warten...</div></div>
    </div>

    <div id="challenge">LIVE-GOAL: 25k LIKES 🖐️</div>
    <div id="pk-bar"><div id="pk-b"></div><div id="pk-r"></div></div>
    
    <div class="truth-box">
        <div style="font-size:7px; font-weight:bold; color:var(--truth);">AUTHENTICITY</div>
        <div id="t-fill"></div>
    </div>

    <div id="lucky-box">
        <i class="fas fa-gem" style="color:var(--gold); font-size:20px;"></i>
        <div id="box-timer" style="font-size:14px; color:var(--gold); font-weight:900;">00:30</div>
    </div>

    <div id="chat"></div>

    <div id="req-btn" onclick="togglePanel()">
        <i class="fas fa-user-plus"></i>
        <div style="position:absolute; top:-5px; right:-5px; background:var(--tt-pink); width:20px; height:20px; border-radius:50%; font-size:10px; display:flex; align-items:center; justify-content:center; font-weight:bold; border:2px solid white;">2</div>
    </div>

    <div id="guest-panel">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <h3>GÄSTE-ANFRAGEN</h3>
            <i class="fas fa-times" onclick="togglePanel()"></i>
        </div>
        <div class="guest-row">
            <div style="display:flex; align-items:center; gap:10px;">
                <img src="https://i.pravatar.cc/100?u=sarah" style="width:40px; border-radius:50%;">
                <div><b>Sarah_Live</b></div>
            </div>
            <button onclick="acceptGuest('slot-2', 'Sarah_Live', 'sarah')" style="background:var(--mod); color:white; border:none; padding:8px 15px; border-radius:8px;">ANNEHMEN</button>
        </div>
        <div class="guest-row">
            <div style="display:flex; align-items:center; gap:10px;">
                <img src="https://i.pravatar.cc/100?u=rico" style="width:40px; border-radius:50%;">
                <div><b>Rico_Vibe</b></div>
            </div>
            <button onclick="acceptGuest('slot-3', 'Rico_Vibe', 'rico')" style="background:var(--mod); color:white; border:none; padding:8px 15px; border-radius:8px;">ANNEHMEN</button>
        </div>
    </div>

    <div id="gate">
        <div style="width:80px; height:80px; background:var(--tt-pink); border-radius:20px; display:flex; align-items:center; justify-content:center; margin-bottom:20px; box-shadow: 0 0 30px var(--tt-pink);">
            <i class="fas fa-crown" style="font-size:40px;"></i>
        </div>
        <h1 style="letter-spacing:8px;">GLIMPSE V80</h1>
        <button onclick="launchApp()" style="background:white; color:black; border:none; padding:20px 70px; border-radius:40px; font-weight:900; margin-top:30px;">START ALL SYSTEMS</button>
    </div>

    <div id="app" style="display:none;">
        <div class="sidebar">
            <div class="s-btn" onclick="startBox()"><i class="fas fa-box" style="color:var(--gold)"></i></div>
            <div class="s-btn" onclick="spawnGhost()"><i class="fas fa-hand-sparkles"></i></div>
            <div class="s-btn" onclick="togglePK()"><i class="fas fa-bolt"></i></div>
            <div class="s-btn" onclick="toggleThermal()"><i class="fas fa-eye"></i></div>
            <div class="s-btn" onclick="location.reload()"><i class="fas fa-power-off"></i></div>
        </div>
        <div style="position:fixed; bottom:30px; width:90%; left:5%; display:flex; gap:10px; z-index:2100;">
            <input type="text" id="u-in" placeholder="Schreiben..." style="flex:1; background:rgba(255,255,255,0.2); border:none; padding:15px; border-radius:30px; color:white; outline:none;" onkeypress="if(event.key==='Enter') send()">
        </div>
    </div>

    <script>
        let isPK = false, pkScore = 50;
        const v = document.getElementById('v');

        async function launchApp() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                v.srcObject = stream;
                v.play();
                document.getElementById('gate').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                runEngines();
            } catch (e) { alert("Bitte Kamera erlauben!"); }
        }

        function runEngines() {
            addMsg("System", "Alle Systeme online. Willkommen Host! ✅");
            setInterval(() => { document.getElementById('t-fill').style.width = Math.floor(Math.random()*30+70) + "%"; }, 3000);
            const names = ["Sarah", "Rico", "Max", "Lia"];
            setInterval(() => { addMsg(names[Math.floor(Math.random()*4)], "Mega Stream! 🔥"); if(isPK) { pkScore = Math.max(10, pkScore-2); updatePK(); } }, 4000);
        }

        function togglePanel() { document.getElementById('guest-panel').classList.toggle('open'); if(navigator.vibrate) navigator.vibrate(20); }

        function acceptGuest(id, name, avatar) {
            const slot = document.getElementById(id);
            slot.classList.remove('empty');
            slot.innerHTML = `<img src="https://i.pravatar.cc/400?u=${avatar}"><div class="slot-name">${name}</div><div style="position:absolute; top:8px; right:8px; background:var(--tt-pink); padding:5px; border-radius:50%; font-size:10px; z-index:15;" onclick="kickGuest('${id}')"><i class="fas fa-user-minus"></i></div>`;
            togglePanel();
            if(navigator.vibrate) navigator.vibrate([40, 60]);
        }

        function kickGuest(id) {
            const slot = document.getElementById(id);
            slot.classList.add('empty');
            slot.innerHTML = `<div class="slot-name">Warten...</div>`;
        }

        function togglePK() { isPK = !isPK; document.getElementById('pk-bar').style.display = isPK ? 'block' : 'none'; }
        function updatePK() { document.getElementById('pk-b').style.width = pkScore + "%"; document.getElementById('pk-r').style.width = (100 - pkScore) + "%"; }
        function toggleThermal() { v.classList.toggle('thermal'); }

        function startBox() {
            const box = document.getElementById('lucky-box'); box.style.display = 'flex';
            let t = 30; const itv = setInterval(() => { t--; document.getElementById('box-timer').innerText = `00:${t<10?'0'+t:t}`; if(t<=0){ clearInterval(itv); box.style.display='none'; alert("BOX OFFEN! 💎"); } }, 1000);
        }

        function addMsg(n, t) {
            const c = document.getElementById('chat'); const m = document.createElement('div'); m.className = 'msg';
            m.innerHTML = `<b>${n}:</b> ${t}`; c.appendChild(m); if(c.children.length > 5) c.removeChild(c.firstChild);
        }

        function send() { const i = document.getElementById('u-in'); if(!i.value) return; addMsg("Du", i.value); i.value = ""; }

        function spawnGhost() {
            const g = document.createElement('div'); g.innerHTML = '🖐️';
            g.style.cssText = "position:absolute; left:40%; bottom:0; font-size:120px; filter:drop-shadow(0 0 30px white); animation: ghostMove 1.6s forwards; z-index:1500; pointer-events:none;";
            document.body.appendChild(g); setTimeout(() => g.remove(), 1600);
        }

        function spawnHeart(e) {
            if(e.target.tagName === 'INPUT' || e.target.closest('#guest-panel')) return;
            const h = document.createElement('div'); h.innerHTML = '❤️';
            h.style.cssText = `position:absolute; left:${e.clientX}px; top:${e.clientY}px; color:#ff0050; font-size:35px; animation: heart 1.2s forwards; z-index:900; pointer-events:none;`;
            document.body.appendChild(h); setTimeout(() => h.remove(), 1200);
            if(isPK) { pkScore = Math.min(95, pkScore+1); updatePK(); }
            if(navigator.vibrate) navigator.vibrate(15);
        }
    </script>
    <style> @keyframes ghostMove { 0% { transform: translateY(500px) scale(0.5); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(-200px) scale(2.5); opacity: 0; } } </style>
</body>
</html>
