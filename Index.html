<script>
    // Simulation einer eingehenden Anfrage (wie bei TikTok)
    function simulateIncomingRequest() {
        const alertBox = document.createElement('div');
        alertBox.style.cssText = "position:fixed; top:20px; left:5%; width:90%; background:linear-gradient(90deg, #ff0050, #007aff); padding:15px; border-radius:15px; z-index:9000; display:flex; justify-content:space-between; align-items:center; animation: slideDown 0.5s forwards; border:1px solid white;";
        alertBox.innerHTML = `
            <div style="display:flex; align-items:center; gap:10px;">
                <img src="https://i.pravatar.cc/100?u=sarah" style="width:35px; border-radius:50%; border:2px solid white;">
                <span style="font-weight:bold; font-size:14px;">Anfrage: Sarah_Live</span>
            </div>
            <button onclick="this.parentElement.remove(); acceptGuest('slot-2', 'Sarah_Live', 'sarah')" style="background:white; color:black; border:none; padding:8px 15px; border-radius:20px; font-weight:bold; font-size:12px;">ANNEHMEN</button>
        `;
        document.body.appendChild(alertBox);
        
        // Sound/Vibration Effekt
        if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
    }

    // Starte eine Test-Anfrage nach 10 Sekunden Live-Zeit
    setTimeout(simulateIncomingRequest, 10000);
</script>

<style>
    @keyframes slideDown {
        from { transform: translateY(-150%); }
        to { transform: translateY(0); }
    }
</style>
