<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GLIMPSE V73 | CONNECT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --tt-pink: #ff0050; --tt-cyan: #00f2ea; --gold: #ffd700; --mod: #007aff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { height: 100%; background: #000; font-family: -apple-system, sans-serif; color: white; overflow: hidden; position: fixed; width: 100%; }

        /* --- QUAD VIDEO GRID --- */
        #video-grid { position: fixed; inset: 0; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 2px; background: #111; z-index: 1; }
        .v-slot { position: relative; background: #050505; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .v-slot video, .v-slot img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; transition: 0.3s; }
        .v-slot.empty { background: linear-gradient(45deg, #111, #222); }
        .v-slot.empty::after { content: '\f234'; font-family: 'Font Awesome 6 Free'; font-weight: 900; opacity: 0.2; font-size: 30px; }
        
        .slot-name { position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,0.6); padding: 2px 8px; border-radius: 4px; font-size: 10px; z-index: 10; border: 0.5px solid rgba(255,255,255,0.2); }

        /* --- GUEST PANEL --- */
        #guest-panel { position: absolute; bottom: 0; left: 0; width: 100%; background: #111; border-top-left-radius: 20px; border-top-right-radius: 20px; z-index: 1000; padding: 20px; transform: translateY(100%); transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); border-top: 2px solid var(--mod); }
        #guest-panel.open { transform: translateY(0); }
        .guest-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 12px; margin-bottom: 10px; }

        /* --- REQUEST BUTTON --- */
        #req-btn { position: absolute; bottom: 100px; left: 15px; width: 45px; height: 45px; background: var(--mod); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 200; box-shadow: 0 0 15px var(--mod); border: 2px solid white; }
        #req-badge { position: absolute; top: -5px; right: -5px; background: var(--tt-pink); color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* --- HUD --- */
        .hud { position: relative; z-index: 100; height: 100%; display: none; flex-direction: column; padding: 50px 15px 20px; }
        .sidebar { position: absolute; right: 10px; top: 120px; display: flex; flex-direction: column; gap: 12px; z-index: 210; }
        .s-btn { width: 48px; height: 48px; background: rgba(0,0,0,0.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(10px); }

        #gate { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="video-grid">
        <div class="v-slot"><video id="v" autoplay playsinline muted></video><div class="slot-name">Du (Host)</div></div>
        <div class="v-slot empty" id="slot-2"><div class="slot-name">Warten...</div></div>
        <div class="v-slot empty" id="slot-3"><div class="slot-name">Warten...</div></div>
        <div class="v-slot empty" id="slot-4"><div class="slot-name">Warten...</div></div>
    </div>

    <div id="req-btn" onclick="toggleGuestPanel()">
        <i class="fas fa-user-plus"></i>
        <div id="req-badge">3</div>
    </div>

    <div id="guest-panel">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <h3 style="letter-spacing:1px;">GÄSTE-ANFRAGEN</h3>
            <i class="fas fa-times" onclick="toggleGuestPanel()"></i>
        </div>
        <div id="guest-list">
            <div class="guest-row">
                <div style="display:flex; align-items:center; gap:10px;">
                    <img src="https://i.pravatar.cc/100?u=sarah" style="width:40px; border-radius:50%;">
                    <div><b>Sarah_Live</b><br><small style="color:var(--gold)">14k Follower</small></div>
                </div>
                <button onclick="acceptGuest('slot-2', 'Sarah_Live', 'sarah')" style="background:var(--mod); color:white; border:none; padding:8px 15px; border-radius:8px; font-weight:bold;">AKZEPTIEREN</button>
            </div>
            <div class="guest-row">
                <div style="display:flex; align-items:center; gap:10px;">
                    <img src="https://i.pravatar.cc/100?u=rico" style="width:40px; border-radius:50%;">
                    <div><b>Rico_Vibe</b><br><small style="color:var(--tt-cyan)">Neu</small></div>
                </div>
                <button onclick="acceptGuest('slot-3', 'Rico_Vibe', 'rico')" style="background:var(--mod); color:white; border:none; padding:8px 15px; border-radius:8px; font-weight:bold;">AKZEPTIEREN</button>
            </div>
        </div>
        <button onclick="copyInvite()" style="width:100%; background:rgba(255,255,255,0.1); border:1px dashed white; color:white; padding:15px; border-radius:12px; margin-top:10px;">
            <i class="fas fa-link"></i> EINLADUNGSLINK KOPIEREN
        </button>
    </div>

    <div id="gate">
        <h1 style="letter-spacing:10px; font-weight:900;">V73 CONNECT</h1>
        <button onclick="launchV73()" style="background:white; color:black; border:none; padding:20px 70px; border-radius:40px; font-weight:900; margin-top:30px;">GO LIVE</button>
    </div>

    <div id="app" class="hud">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div style="background:rgba(0,0,0,0.5); padding:6px 15px; border-radius:20px; font-size:12px; border:1px solid var(--tt-cyan);">
                <b>MULTIPLEX_ON</b> <i class="fas fa-network-wired"></i>
            </div>
            <div onclick="location.reload()" style="font-size:24px;"><i class="fas fa-power-off"></i></div>
        </div>

        <div class="sidebar">
            <div class="s-btn" onclick="spawnGhost()"><i class="fas fa-hand-sparkles"></i></div>
            <div class="s-btn" onclick="alert('PK Suche...')"><i class="fas fa-bolt"></i></div>
            <div class="s-btn" onclick="alert('Alle Gäste stummgeschaltet')"><i class="fas fa-microphone-slash"></i></div>
            <div class="s-btn" onclick="alert('Studio-Filter')"><i class="fas fa-wand-sparkles"></i></div>
        </div>

        <div id="chat" style="position:absolute; bottom:100px; right:15px; width:60%; height:150px; overflow:hidden; pointer-events:none; display:flex; flex-direction:column; justify-content:flex-end; text-align:right;"></div>
    </div>

    <script>
        async function launchV73() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                document.getElementById('v').srcObject = s;
                document.getElementById('gate').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                simulateRequests();
            } catch (e) { alert("Zugriff verweigert."); }
        }

        function toggleGuestPanel() {
            document.getElementById('guest-panel').classList.toggle('open');
            if(navigator.vibrate) navigator.vibrate(20);
        }

        function acceptGuest(slotId, name, avatar) {
            const slot = document.getElementById(slotId);
            slot.classList.remove('empty');
            slot.innerHTML = `<img src="https://i.pravatar.cc/400?u=${avatar}" style="opacity:1"><div class="slot-name">${name}</div><div style="position:absolute; top:5px; right:5px; color:white; background:red; padding:4px; border-radius:50%; font-size:10px;" onclick="kickGuest('${slotId}')"><i class="fas fa-user-minus"></i></div>`;
            
            toggleGuestPanel();
            if(navigator.vibrate) navigator.vibrate([30, 50, 30]);
            
            // Badge reduzieren
            const b = document.getElementById('req-badge');
            b.innerText = Math.max(0, parseInt(b.innerText) - 1);
        }

        function kickGuest(slotId) {
            const slot = document.getElementById(slotId);
            slot.classList.add('empty');
            slot.innerHTML = `<div class="slot-name">Warten...</div>`;
            if(navigator.vibrate) navigator.vibrate(100);
        }

        function copyInvite() {
            alert("Einladungslink in Zwischenablage kopiert! Schicke ihn deinen Gästen.");
        }

        function simulateRequests() {
            setInterval(() => {
                const chat = document.getElementById('chat');
                const m = document.createElement('div');
                m.style.cssText = "background:rgba(0,0,0,0.4); padding:6px 12px; margin-bottom:5px; border-radius:15px; font-size:11px; width:fit-content; align-self:flex-end;";
                m.innerHTML = `<b>User_${Math.floor(Math.random()*99)}:</b> Will als Gast rein! 🙏`;
                chat.appendChild(m);
                if(chat.children.length > 5) chat.removeChild(chat.firstChild);
            }, 5000);
        }

        function spawnGhost() {
            const g = document.createElement('div');
            g.innerHTML = '🖐️';
            g.style.cssText = "position:absolute; left:40%; bottom:0; font-size:100px; filter:drop-shadow(0 0 20px white); animation: ghostMove 1.5s forwards; z-index:150;";
            document.body.appendChild(g);
            setTimeout(() => g.remove(), 1500);
        }
    </script>
    <style> @keyframes ghostMove { 0% { transform: translateY(500px) scale(0.5); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(-200px) scale(2); opacity: 0; } } </style>
</body>
</html>
