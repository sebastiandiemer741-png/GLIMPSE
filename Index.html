<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GLIMPSE V21 | QUANTUM FX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --neon: #00f2ea; --magenta: #ff00ff; --gold: #ffd700; --fx-blue: #007bff;
            --glass: rgba(255,255,255,0.1); 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Inter', sans-serif; color: white; overflow: hidden; }

        /* --- FX CANVAS (DIE NEUHEIT) --- */
        #fx-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 9000; }

        /* --- SYSTEM GATE --- */
        #gate { position: fixed; inset: 0; background: #000; z-index: 100000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 1s; }
        .fx-core { width: 100px; height: 100px; background: var(--neon); filter: blur(30px); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.5); opacity: 1; } }
        .gate-input { width: 80%; background: #111; border: 1px solid #333; padding: 20px; border-radius: 25px; color: white; text-align: center; margin-top: 40px; }
        .gate-btn { width: 80%; margin-top: 20px; padding: 20px; border-radius: 25px; border: none; background: white; color: black; font-weight: 900; }

        /* --- MAIN APP --- */
        .app { display: none; height: 100%; position: relative; }
        .stream-view { height: 100vh; position: relative; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* MODERATOR FX-PANEL */
        #fx-panel { position: fixed; bottom: 120px; left: 15px; width: 300px; background: rgba(0,0,0,0.8); backdrop-filter: blur(25px); border-radius: 30px; border: 1px solid var(--neon); padding: 20px; display: none; z-index: 8500; }
        .fx-btn { width: 45%; background: var(--glass); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 12px; border-radius: 15px; font-size: 10px; margin: 5px; cursor: pointer; font-weight: 800; }
        .fx-btn:active { background: var(--neon); color: black; }

        /* SIDEBAR */
        .sidebar { position: absolute; right: 15px; bottom: 130px; display: flex; flex-direction: column; gap: 20px; z-index: 4000; }
        .s-tool { width: 60px; height: 60px; background: var(--glass); backdrop-filter: blur(20px); border-radius: 20px; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.1); }
        .mod-active { border-color: var(--neon); color: var(--neon); box-shadow: 0 0 15px var(--neon); }

        /* G-POWER DISPLAY */
        .gp-display { position: fixed; top: 50px; left: 20px; background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 25px; border: 1.5px solid var(--gold); z-index: 5000; color: var(--gold); font-weight: 900; font-size: 14px; }
    </style>
</head>
<body>

    <canvas id="fx-canvas"></canvas>

    <div id="gate">
        <div class="fx-core"></div>
        <input type="text" id="user-id" class="gate-input" placeholder="@DEINE_IDENTITY">
        <button class="gate-btn" onclick="startFXApp()">FX-SYSTEM BOOTEN</button>
    </div>

    <div id="app" class="app">
        <div class="gp-display"><i class="fas fa-bolt"></i> <span id="gp-val">750</span> GP</div>

        <div class="stream-view">
            <video src="https://www.w3schools.com/html/mov_bbb.mp4" id="v-main" loop muted autoplay playsinline></video>
            
            <div id="fx-panel">
                <h4 style="margin:0 0 15px 0; color:var(--neon); font-size:12px; letter-spacing:2px;">QUANTUM MOD PANEL</h4>
                <button class="fx-btn" onclick="triggerFX('fireworks')">🎆 FIREWORKS</button>
                <button class="fx-btn" onclick="triggerFX('matrix')">💻 MATRIX MODE</button>
                <button class="fx-btn" onclick="triggerFX('shake')">🫨 SCREEN SHAKE</button>
                <button class="fx-btn" onclick="triggerFX('morph')">🌀 MORPH VIDEO</button>
            </div>

            <div class="sidebar">
                <div class="s-tool mod-active" onclick="toggleFXPanel()"><i class="fas fa-wand-sparkles"></i></div>
                <div class="s-tool" onclick="addGP()"><i class="fas fa-heart"></i></div>
                <div class="s-tool"><i class="fas fa-bolt-lightning" style="color:var(--gold)"></i></div>
                <div class="s-tool"><i class="fas fa-share-nodes"></i></div>
            </div>

            <div style="position:absolute; bottom:120px; left:20px; width:70%; text-shadow: 2px 2px 10px black;">
                <h3 id="display-name" style="margin:0; font-size:24px; color:var(--neon);">@User</h3>
                <p style="opacity:0.9; font-size:14px; margin-top:5px;">V21: Quantum FX Engine. Mods können jetzt den Stream manipulieren! 🌀✨</p>
            </div>
        </div>

        <div style="position:fixed; bottom:25px; left:5%; width:90%; height:75px; background:rgba(10,10,10,0.9); border-radius:35px; display:flex; justify-content:space-around; align-items:center; border:1px solid #222; z-index:10000;">
            <i class="fas fa-house active" style="font-size:22px; color:white;"></i>
            <i class="fas fa-compass" style="font-size:22px; color:#444;"></i>
            <div style="width:60px; height:60px; background:white; color:black; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:28px; transform:translateY(-15px);">+</div>
            <i class="fas fa-paper-plane" style="font-size:22px; color:#444;"></i>
            <i class="fas fa-user-astronaut" style="font-size:22px; color:#444;"></i>
        </div>
    </div>

    <script>
        let gp = 750;
        const canvas = document.getElementById('fx-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        function startFXApp() {
            const name = document.getElementById('user-id').value;
            if(name.length > 1) {
                document.getElementById('display-name').innerText = "@" + name;
                document.getElementById('gate').style.display = 'none';
                document.getElementById('app').style.display = 'block';
            }
        }

        function toggleFXPanel() {
            const p = document.getElementById('fx-panel');
            p.style.display = (p.style.display === 'block') ? 'none' : 'block';
        }

        function triggerFX(type) {
            const v = document.getElementById('v-main');
            if(type === 'shake') {
                v.style.transform = "scale(1.1) rotate(5deg)";
                setTimeout(() => v.style.transform = "scale(1)", 500);
            }
            if(type === 'morph') {
                v.style.filter = "hue-rotate(180deg) invert(1)";
                setTimeout(() => v.style.filter = "none", 2000);
            }
            if(type === 'fireworks') {
                createParticles();
            }
            if(navigator.vibrate) navigator.vibrate([50, 30, 50]);
        }

        function createParticles() {
            const particles = [];
            for(let i=0; i<50; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: canvas.height,
                    speed: Math.random() * 15 + 5,
                    color: `hsl(${Math.random() * 360}, 100%, 50%)`
                });
            }
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.y -= p.speed;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
                    ctx.fill();
                });
                if(particles[0].y > -50) requestAnimationFrame(animate);
            }
            animate();
        }

        function addGP() {
            gp += 10;
            document.getElementById('gp-val').innerText = gp;
            if(navigator.vibrate) navigator.vibrate(20);
        }

        document.body.addEventListener('touchstart', () => { document.getElementById('v-main').muted = false; }, {once: true});
    </script>
</body>
</html>
