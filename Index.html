<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GLIMPSE V78 | FINAL FORCE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --tt-pink: #ff0050; --tt-cyan: #00f2ea; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { height: 100%; background: #000; font-family: -apple-system, sans-serif; color: white; overflow: hidden; position: fixed; width: 100%; }

        /* --- VIDEO ENGINE --- */
        #v-wrap { position: fixed; inset: 0; z-index: 1; background: #111; display: flex; align-items: center; justify-content: center; }
        #v { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); background: #000; display: block; }

        /* --- STATUS DEBUGGER --- */
        #status-msg { position: absolute; top: 100px; width: 100%; text-align: center; font-size: 10px; color: #555; z-index: 50; }

        /* --- CHAT --- */
        #chat { position: absolute; bottom: 100px; left: 15px; width: 80%; height: 200px; display: flex; flex-direction: column; justify-content: flex-end; pointer-events: none; z-index: 1000; }
        .msg { background: rgba(0,0,0,0.6); padding: 8px 12px; margin-bottom: 5px; border-radius: 12px; font-size: 13px; width: fit-content; border-left: 3px solid var(--tt-cyan); animation: slide 0.3s ease; backdrop-filter: blur(5px); }

        /* --- HUD --- */
        .hud { position: relative; z-index: 1100; height: 100%; display: none; }
        .s-btn { position: absolute; right: 15px; top: 150px; width: 50px; height: 50px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid white; }

        #gate { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        button { background: white; color: black; border: none; padding: 20px 60px; border-radius: 40px; font-weight: 900; font-size: 16px; box-shadow: 0 0 20px rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <div id="status-msg">System initialisiert...</div>

    <div id="v-wrap">
        <video id="v" autoplay playsinline muted webkit-playsinline></video>
    </div>

    <div id="chat"></div>

    <div id="gate">
        <i class="fas fa-video" style="font-size:40px; color:var(--tt-pink); margin-bottom:20px;"></i>
        <h2 style="letter-spacing:5px;">OMNIPOTENT V78</h2>
        <p style="font-size:12px; opacity:0.5; margin: 15px 0 25px;">Kamera-Check läuft...</p>
        <button id="start-btn" onclick="initCamera()">BROADCAST STARTEN</button>
    </div>

    <div id="app" class="hud">
        <div class="s-btn" onclick="location.reload()"><i class="fas fa-sync"></i></div>
    </div>

    <script>
        const v = document.getElementById('v');
        const s = document.getElementById('status-msg');

        async function initCamera() {
            s.innerText = "Frage Kamera-Zugriff an...";
            
            const constraints = {
                video: { facingMode: "user", width: 1280, height: 720 },
                audio: false
            };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                s.innerText = "Stream empfangen, verbinde Video...";
                
                v.srcObject = stream;

                // FORCE PLAY EVENT
                v.addEventListener('loadedmetadata', () => {
                    v.play()
                        .then(() => {
                            s.innerText = "Kamera läuft! ✅";
                            document.getElementById('gate').style.display = 'none';
                            document.getElementById('app').style.display = 'block';
                            startChat();
                        })
                        .catch(err => {
                            s.innerText = "Autoplay blockiert. Versuche manuell...";
                            v.play(); // Nochmaliger Versuch
                        });
                });

            } catch (err) {
                s.innerText = "FEHLER: " + err.name;
                alert("Bitte Safari-Einstellungen prüfen: \n1. Einstellungen -> Safari -> Kamera -> Erlauben \n2. Energiesparmodus ausschalten!");
            }
        }

        function startChat() {
            addMsg("System", "Verbindung stabil. Chat aktiv.");
            setInterval(() => {
                addMsg("Zuschauer", "Wir sehen dich jetzt! 🔥");
            }, 5000);
        }

        function addMsg(n, t) {
            const c = document.getElementById('chat');
            const m = document.createElement('div');
            m.className = 'msg';
            m.innerHTML = `<b>${n}:</b> ${t}`;
            c.appendChild(m);
            if(c.children.length > 5) c.removeChild(chat.firstChild);
        }

        // Fix für iOS Touch-Start
        document.body.addEventListener('touchstart', function() {
            if (v.paused && v.srcObject) {
                v.play();
            }
        }, false);
    </script>
</body>
</html>
