<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GLIMPSE V36</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #00f2ea; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        
        /* Kamera Hintergrund */
        #v { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; transform: scaleX(-1); display: none; }
        
        /* Benutzeroberfläche */
        #ui { position: relative; z-index: 10; text-align: center; width: 100%; }
        
        .btn { background: #00f2ea; color: #000; border: none; padding: 20px 40px; border-radius: 50px; font-weight: bold; font-size: 18px; text-transform: uppercase; box-shadow: 0 0 20px #00f2ea; cursor: pointer; }
        
        .dock { position: fixed; bottom: 30px; width: 90%; height: 70px; background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); border-radius: 35px; display: none; align-items: center; justify-content: space-around; z-index: 20; border: 1px solid rgba(0,242,234,0.3); }
        
        .plus { width: 60px; height: 60px; background: white; color: black; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; transform: translateY(-15px); }
        
        #msg { color: white; font-size: 12px; margin-top: 20px; opacity: 0.5; }
    </style>
</head>
<body>

    <video id="v" autoplay playsinline muted></video>

    <div id="ui">
        <h1 id="title" style="letter-spacing: 10px; margin-bottom: 30px;">GLIMPSE</h1>
        <button id="startBtn" class="btn" onclick="startApp()">SYNC START</button>
        <p id="msg">V36 | OMNIVERSE READY</p>
    </div>

    <div id="dock" class="dock">
        <span style="font-size:24px">🏠</span>
        <label for="up" class="plus">+</label>
        <input type="file" id="up" accept="video/*" style="display:none" onchange="alert('Video bereit!')">
        <span style="font-size:24px" onclick="location.reload()">🔄</span>
    </div>

    <script>
        async function startApp() {
            const video = document.getElementById('v');
            const ui = document.getElementById('ui');
            const dock = document.getElementById('dock');
            const startBtn = document.getElementById('startBtn');

            try {
                // Kamera aktivieren
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                video.style.display = "block";
                
                // UI umschalten
                startBtn.style.display = "none";
                document.getElementById('title').style.display = "none";
                document.getElementById('msg').style.display = "none";
                dock.style.display = "flex";
                
                if(navigator.vibrate) navigator.vibrate(50);
            } catch (e) {
                alert("Kamera-Fehler! Bitte in Einstellungen -> Safari -> Kamera erlauben.");
                // Trotzdem Dock zeigen für Demo
                dock.style.display = "flex";
                startBtn.style.display = "none";
            }
        }
    </script>
</body>
</html>
